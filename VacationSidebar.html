<!DOCTYPE html>
<html lang="uk">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
      :root {
        color: #202124;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 14px;
      }
      h2 {
        font-size: 18px;
        margin: 0;
      }
      h3 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .tabs {
        background: #f1f3f4;
        border-radius: 8px;
        display: grid;
        gap: 3px;
        grid-template-columns: repeat(3, 1fr);
        margin-bottom: 14px;
        padding: 3px;
      }
      .tab {
        background: transparent;
        border: 0;
        border-radius: 6px;
        color: #5f6368;
        cursor: pointer;
        font-size: 11px;
        padding: 8px 4px;
      }
      .tab.active {
        background: #fff;
        box-shadow: 0 1px 3px rgba(60, 64, 67, 0.25);
        color: #1967d2;
        font-weight: 700;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .card {
        border: 1px solid #dadce0;
        border-radius: 8px;
        margin-bottom: 10px;
        padding: 12px;
      }
      .stats {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }
      .stat {
        background: #f8f9fa;
        border-radius: 7px;
        padding: 10px;
        text-align: center;
      }
      .stat strong {
        color: #1967d2;
        display: block;
        font-size: 23px;
      }
      .stat span {
        color: #5f6368;
        font-size: 11px;
      }
      label {
        color: #5f6368;
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin: 11px 0 4px;
      }
      input,
      select {
        background: #fff;
        border: 1px solid #dadce0;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 13px;
        padding: 8px;
        width: 100%;
      }
      button.action {
        background: #1967d2;
        border: 1px solid #1967d2;
        border-radius: 5px;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        margin: 5px 0;
        padding: 9px;
        width: 100%;
      }
      button.secondary {
        background: #fff;
        color: #1967d2;
      }
      button.danger {
        background: #fff;
        border-color: #c5221f;
        color: #c5221f;
      }
      button.small {
        font-size: 11px;
        margin: 6px 4px 0 0;
        padding: 6px 8px;
        width: auto;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.55;
      }
      .muted {
        color: #5f6368;
        font-size: 11px;
      }
      .title-line {
        align-items: start;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }
      .badge {
        background: #e8f0fe;
        border-radius: 10px;
        color: #1967d2;
        font-size: 10px;
        font-weight: 700;
        padding: 3px 7px;
      }
      .option.best {
        border-left: 4px solid #188038;
      }
      .option.valid {
        border-left: 4px solid #f9ab00;
      }
      .violation {
        border-left: 4px solid #c5221f;
      }
      .status {
        border-radius: 6px;
        display: none;
        font-size: 12px;
        margin: 10px 0;
        padding: 9px;
        white-space: pre-wrap;
      }
      .status.show {
        display: block;
      }
      .status.success {
        background: #e6f4ea;
        color: #137333;
      }
      .status.error {
        background: #fce8e6;
        color: #c5221f;
      }
      .status.info {
        background: #e8f0fe;
        color: #1967d2;
      }
      .empty {
        color: #5f6368;
        font-size: 12px;
        padding: 18px 8px;
        text-align: center;
      }
      pre {
        font-family: Arial, sans-serif;
        font-size: 12px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Відпустки WASB</h2>
      <button id="refresh" class="action secondary small" type="button">
        Оновити
      </button>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab active" data-panel="schedule" type="button">Графік</button>
      <button class="tab" data-panel="add" type="button">Додати</button>
      <button class="tab" data-panel="find" type="button">Підібрати</button>
      <button class="tab" data-panel="move" type="button">Перенести</button>
      <button class="tab" data-panel="check" type="button">Перевірка</button>
      <button class="tab" data-panel="report" type="button">Звіт</button>
    </div>

    <section id="schedule" class="panel active">
      <div class="stats">
        <div class="stat"><strong id="total">0</strong><span>відпусток</span></div>
        <div class="stat"><strong id="people">0</strong><span>людей</span></div>
      </div>
      <button id="rebuild" class="action" type="button">Оновити графік</button>
      <button id="openSchedule" class="action secondary" type="button">
        Відкрити календар
      </button>
      <h3>Активні відпустки</h3>
      <div id="vacations"></div>
      <div id="scheduleStatus" class="status"></div>
    </section>

    <section id="add" class="panel">
      <div class="card">
        <h3>Додати відпустку</h3>
        <label for="addPerson">Військовослужбовець</label>
        <select id="addPerson"></select>
        <label for="addType">Тип</label>
        <select id="addType">
          <option value="В1">В1 - перша</option>
          <option value="В2">В2 - друга</option>
          <option value="ВД">ВД - додаткова</option>
          <option value="СО">СО - сімейні обставини</option>
        </select>
        <label for="addStart">Дата початку</label>
        <input id="addStart" type="date">
        <label for="addDays">Кількість днів</label>
        <input id="addDays" type="number" min="1" max="60" value="15">
      </div>
      <button id="addSubmit" class="action" type="button">Додати</button>
      <div id="addStatus" class="status"></div>
    </section>

    <section id="find" class="panel">
      <div class="card">
        <h3>Підібрати найкращу дату</h3>
        <label for="findPerson">Військовослужбовець</label>
        <select id="findPerson"></select>
        <label for="findNumber">Слот</label>
        <select id="findNumber">
          <option value="1">В1 - перша</option>
          <option value="2">В2 - друга</option>
        </select>
        <label for="findStart">Бажана дата</label>
        <input id="findStart" type="date">
        <label for="findDays">Кількість днів</label>
        <input id="findDays" type="number" min="1" max="60" value="15">
        <label for="findWindow">Вікно пошуку, днів до і після</label>
        <input id="findWindow" type="number" min="0" max="180" value="30">
      </div>
      <button id="findSubmit" class="action" type="button">Підібрати</button>
      <div id="options"></div>
      <div id="findStatus" class="status"></div>
    </section>

    <section id="move" class="panel">
      <div class="card">
        <h3>Перенести відпустку</h3>
        <label for="moveVacation">Відпустка</label>
        <select id="moveVacation"></select>
        <label for="moveStart">Нова дата початку</label>
        <input id="moveStart" type="date">
        <label for="moveDays">Кількість днів</label>
        <input id="moveDays" type="number" min="1" max="60" value="15">
      </div>
      <button id="moveSubmit" class="action" type="button">Перенести</button>
      <div id="moveStatus" class="status"></div>
    </section>

    <section id="check" class="panel">
      <button id="checkAll" class="action" type="button">Перевірити всі правила</button>
      <div class="card">
        <h3>Перевірити конкретну дату</h3>
        <label for="checkPerson">Військовослужбовець</label>
        <select id="checkPerson"></select>
        <label for="checkNumber">Слот</label>
        <select id="checkNumber">
          <option value="1">В1 - перша</option>
          <option value="2">В2 - друга</option>
        </select>
        <label for="checkStart">Дата початку</label>
        <input id="checkStart" type="date">
        <label for="checkDays">Кількість днів</label>
        <input id="checkDays" type="number" min="1" max="60" value="15">
        <button id="checkDate" class="action secondary" type="button">
          Перевірити дату
        </button>
      </div>
      <div id="violations"></div>
      <div id="checkStatus" class="status"></div>
    </section>

    <section id="report" class="panel">
      <button id="reportSubmit" class="action" type="button">Сформувати звіт</button>
      <div class="card"><pre id="reportText">Звіт ще не сформовано.</pre></div>
      <div id="reportStatus" class="status"></div>
    </section>

    <script>
      var state = { personnel: [], vacations: [], stats: {} };

      function byId(id) {
        return document.getElementById(id);
      }

      function clear(element) {
        while (element.firstChild) element.removeChild(element.firstChild);
      }

      function node(tag, text, className) {
        var element = document.createElement(tag);
        if (text !== undefined && text !== null) element.textContent = text;
        if (className) element.className = className;
        return element;
      }

      function showStatus(id, message, type) {
        var element = byId(id);
        element.textContent = message || "";
        element.className = "status show " + (type || "info");
      }

      function failure(statusId) {
        return function (error) {
          var message = error && error.message ? error.message : String(error);
          showStatus(statusId, "Помилка: " + message, "error");
        };
      }

      function switchPanel(panelId) {
        document.querySelectorAll(".tab").forEach(function (tab) {
          tab.classList.toggle("active", tab.dataset.panel === panelId);
        });
        document.querySelectorAll(".panel").forEach(function (panel) {
          panel.classList.toggle("active", panel.id === panelId);
        });
      }

      function option(value, label) {
        var item = document.createElement("option");
        item.value = value;
        item.textContent = label;
        return item;
      }

      function personLabel(person) {
        return person.callsign
          ? person.callsign + " - " + person.fml
          : person.fml;
      }

      function fillPeople() {
        ["addPerson", "findPerson", "checkPerson"].forEach(function (id) {
          var select = byId(id);
          var selected = select.value;
          clear(select);
          select.appendChild(option("", "Оберіть людину"));
          state.personnel.forEach(function (person) {
            select.appendChild(option(person.fml, personLabel(person)));
          });
          select.value = selected;
        });
      }

      function vacationLabel(vacation) {
        return (
          vacation.type +
          " | " +
          vacation.fml +
          " | " +
          vacation.startDate +
          " - " +
          vacation.endDate
        );
      }

      function fillMoveVacations() {
        var select = byId("moveVacation");
        var selected = select.value;
        clear(select);
        select.appendChild(option("", "Оберіть відпустку"));
        state.vacations.forEach(function (vacation, index) {
          select.appendChild(option(String(index), vacationLabel(vacation)));
        });
        select.value = selected;
      }

      function renderVacations() {
        var container = byId("vacations");
        clear(container);
        if (!state.vacations.length) {
          container.appendChild(node("div", "Активних відпусток немає.", "empty"));
          return;
        }
        state.vacations.forEach(function (vacation, index) {
          var card = node("div", null, "card");
          var line = node("div", null, "title-line");
          line.appendChild(node("strong", vacation.fml));
          line.appendChild(node("span", vacation.type, "badge"));
          card.appendChild(line);
          card.appendChild(
            node(
              "div",
              vacation.startDate +
                " - " +
                vacation.endDate +
                " (" +
                vacation.days +
                " дн.)",
              "muted",
            ),
          );
          var move = node("button", "Перенести", "action secondary small");
          move.type = "button";
          move.addEventListener("click", function () {
            byId("moveVacation").value = String(index);
            byId("moveStart").value = vacation.startDate;
            byId("moveDays").value = vacation.days;
            switchPanel("move");
          });
          var cancel = node("button", "Скасувати", "action danger small");
          cancel.type = "button";
          cancel.addEventListener("click", function () {
            cancelVacation(vacation);
          });
          card.appendChild(move);
          card.appendChild(cancel);
          container.appendChild(card);
        });
      }

      function renderState(result) {
        state = result || { personnel: [], vacations: [], stats: {} };
        byId("total").textContent = state.stats.total || 0;
        byId("people").textContent = state.stats.activePeople || 0;
        fillPeople();
        fillMoveVacations();
        renderVacations();
      }

      function loadState() {
        google.script.run
          .withSuccessHandler(renderState)
          .withFailureHandler(failure("scheduleStatus"))
          .getVacationSidebarState();
      }

      function formValue(id) {
        return byId(id).value;
      }

      function renderOptions(options) {
        var container = byId("options");
        clear(container);
        if (!options || !options.length || options[0].status === "REJECTED") {
          container.appendChild(
            node(
              "div",
              options && options[0]
                ? options[0].explanation
                : "Допустимих варіантів не знайдено.",
              "empty",
            ),
          );
          return;
        }
        options.forEach(function (item) {
          var card = node(
            "div",
            null,
            "card option " + (item.rank === 1 ? "best" : "valid"),
          );
          var line = node("div", null, "title-line");
          line.appendChild(node("strong", "Варіант " + item.rank));
          line.appendChild(node("span", item.label, "badge"));
          card.appendChild(line);
          card.appendChild(
            node(
              "div",
              item.startDate +
                " - " +
                item.endDate +
                " | " +
                item.days +
                " дн. | score " +
                item.score,
            ),
          );
          card.appendChild(node("div", item.explanation, "muted"));
          var apply = node("button", "Застосувати", "action small");
          apply.type = "button";
          apply.addEventListener("click", function () {
            applyOption(item);
          });
          card.appendChild(apply);
          container.appendChild(card);
        });
      }

      function applyOption(item) {
        showStatus("findStatus", "Застосовуємо варіант...", "info");
        google.script.run
          .withSuccessHandler(function () {
            showStatus("findStatus", "Варіант застосовано.", "success");
            loadState();
          })
          .withFailureHandler(failure("findStatus"))
          .applyVacationOptionFromSidebar(item);
      }

      function cancelVacation(vacation) {
        if (!window.confirm("Скасувати " + vacationLabel(vacation) + "?")) return;
        google.script.run
          .withSuccessHandler(function () {
            showStatus("scheduleStatus", "Відпустку скасовано.", "success");
            loadState();
          })
          .withFailureHandler(failure("scheduleStatus"))
          .cancelVacationFromSidebar(vacation);
      }

      function renderViolations(checks) {
        var container = byId("violations");
        clear(container);
        if (!checks || !checks.length) {
          container.appendChild(node("div", "Порушень не знайдено.", "card"));
          return;
        }
        checks.forEach(function (item) {
          var card = node("div", null, "card violation");
          card.appendChild(node("strong", item.type + " | " + item.fml));
          card.appendChild(node("div", item.date, "muted"));
          card.appendChild(node("div", item.description));
          container.appendChild(card);
        });
      }

      document.querySelectorAll(".tab").forEach(function (tab) {
        tab.addEventListener("click", function () {
          switchPanel(tab.dataset.panel);
        });
      });

      byId("refresh").addEventListener("click", loadState);
      byId("rebuild").addEventListener("click", function () {
        showStatus("scheduleStatus", "Оновлюємо календар...", "info");
        google.script.run
          .withSuccessHandler(function (result) {
            showStatus(
              "scheduleStatus",
              "Графік оновлено: " +
                result.schedulePeople +
                " людей, " +
                result.scheduleDays +
                " днів.",
              "success",
            );
            loadState();
          })
          .withFailureHandler(failure("scheduleStatus"))
          .rebuildVacationScheduleFromSidebar();
      });
      byId("openSchedule").addEventListener("click", function () {
        google.script.run
          .withFailureHandler(failure("scheduleStatus"))
          .openVacationScheduleFromSidebar();
      });
      byId("addSubmit").addEventListener("click", function () {
        showStatus("addStatus", "Додаємо відпустку...", "info");
        google.script.run
          .withSuccessHandler(function () {
            showStatus("addStatus", "Відпустку додано.", "success");
            loadState();
          })
          .withFailureHandler(failure("addStatus"))
          .addVacationFromSidebar({
            fml: formValue("addPerson"),
            type: formValue("addType"),
            startDate: formValue("addStart"),
            days: Number(formValue("addDays")),
          });
      });
      byId("findSubmit").addEventListener("click", function () {
        showStatus("findStatus", "Підбираємо варіанти...", "info");
        google.script.run
          .withSuccessHandler(function (options) {
            renderOptions(options);
            showStatus("findStatus", "Підбір завершено.", "success");
          })
          .withFailureHandler(failure("findStatus"))
          .findVacationSidebarOptions({
            fml: formValue("findPerson"),
            vacationNumber: Number(formValue("findNumber")),
            desiredStart: formValue("findStart"),
            durationDays: Number(formValue("findDays")),
            searchWindow: Number(formValue("findWindow")),
          });
      });
      byId("moveSubmit").addEventListener("click", function () {
        var vacation = state.vacations[Number(formValue("moveVacation"))];
        if (!vacation) {
          showStatus("moveStatus", "Оберіть відпустку.", "error");
          return;
        }
        google.script.run
          .withSuccessHandler(function () {
            showStatus("moveStatus", "Відпустку перенесено.", "success");
            loadState();
          })
          .withFailureHandler(failure("moveStatus"))
          .moveVacationFromSidebar({
            fml: vacation.fml,
            vacationNumber: vacation.vacationNumber,
            startDate: formValue("moveStart"),
            days: Number(formValue("moveDays")),
          });
      });
      byId("checkAll").addEventListener("click", function () {
        google.script.run
          .withSuccessHandler(function (result) {
            renderViolations(result.checks);
            showStatus(
              "checkStatus",
              result.errorCount
                ? "Знайдено порушень: " + result.errorCount
                : "Порушень не знайдено.",
              result.errorCount ? "error" : "success",
            );
          })
          .withFailureHandler(failure("checkStatus"))
          .checkVacationRulesFromSidebar();
      });
      byId("checkDate").addEventListener("click", function () {
        google.script.run
          .withSuccessHandler(function (result) {
            renderViolations(result.violations);
            showStatus(
              "checkStatus",
              result.isValid ? "Дата допустима." : "Дата має порушення.",
              result.isValid ? "success" : "error",
            );
          })
          .withFailureHandler(failure("checkStatus"))
          .validateVacationDateFromSidebar({
            fml: formValue("checkPerson"),
            vacationNumber: Number(formValue("checkNumber")),
            startDate: formValue("checkStart"),
            days: Number(formValue("checkDays")),
          });
      });
      byId("reportSubmit").addEventListener("click", function () {
        google.script.run
          .withSuccessHandler(function (result) {
            byId("reportText").textContent = result.summary;
            showStatus("reportStatus", "Звіт сформовано.", "success");
          })
          .withFailureHandler(failure("reportStatus"))
          .generateVacationReportFromSidebar();
      });

      loadState();
    </script>
  </body>
</html>

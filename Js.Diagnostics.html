<script>
// Js.Diagnostics — active Stage 7.1 runtime fragment.

  // =========================
  // HEALTH CHECK
  // =========================
  function getHealthCheckOptions_() {
    return STATE.healthCheckMode === 'full'
      ? {
          shallow: false,
          includeStage3Base: true,
          includeCompatibilityLayer: true,
          includeReconciliationPreview: true
        }
      : {
          shallow: true,
          includeStage3Base: false,
          includeCompatibilityLayer: false,
          includeReconciliationPreview: false
        };
  }

  function getHealthCheckModeLabel_() {
    return STATE.healthCheckMode === 'full' ? 'Повна' : 'Швидка';
  }

  function renderHealthCheckModeSwitcher_() {
    return `
      <div class="result-item">
        <div class="result-value">
          <div class="mode-toggle">
            <button
              id="healthModeQuick"
              type="button"
              class="mode-toggle-btn ${STATE.healthCheckMode === 'quick' ? 'active' : ''}"
              onclick="SidebarApp.setHealthCheckMode('quick')"
            >
              Швидка
            </button>
            <button
              id="healthModeFull"
              type="button"
              class="mode-toggle-btn ${STATE.healthCheckMode === 'full' ? 'active' : ''}"
              onclick="SidebarApp.setHealthCheckMode('full')"
            >
              Повна
            </button>
          </div>

          <div class="health-mode-note">
            ${STATE.healthCheckMode === 'full'
              ? 'Повна діагностика разом із compatibility / legacy.'
              : 'Швидка перевірка без legacy.'}
          </div>
        </div>
      </div>
    `;
  }

  function showHealthCheckPanel() {
    showStandardResult(`${getHealthCheckModeLabel_()} перевірка`);

    setHtml('resultContent', `
      ${renderHealthCheckModeSwitcher_()}

      <div class="result-item">
        <div class="result-label">Запуск перевірки</div>
        <div class="result-value" style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="SidebarApp.runHealthCheck()">🩺 Перевірити</button>
          <button class="btn" onclick="SidebarApp.copyHealthReport()">📋 Копіювати звіт</button>
        </div>
      </div>

      <div class="result-item">
        <div class="result-label">Поточний режим</div>
        <div class="result-value">${escapeHtml(getHealthCheckModeLabel_())}</div>
      </div>
    `);
  }

  function setHealthCheckMode(mode) {
    const nextMode = mode === 'full' ? 'full' : 'quick';
    STATE.healthCheckMode = nextMode;

    const quickBtn = $id('healthModeQuick');
    const fullBtn = $id('healthModeFull');
    if (quickBtn) quickBtn.classList.toggle('active', nextMode === 'quick');
    if (fullBtn) fullBtn.classList.toggle('active', nextMode === 'full');

    logToConsole(
      `Режим: ${nextMode === 'full' ? 'повна діагностика' : 'швидка перевірка'}`,
      'info'
    );

    showHealthCheckPanel();
  }

  async function runHealthCheck() {
    assertAdminAction_('healthCheck');
    showStandardResult(`${getHealthCheckModeLabel_()} перевірка`);

    setHtml('resultContent', `
      ${renderHealthCheckModeSwitcher_()}

      <div class="result-item">
        <div class="result-label">Перевірка системи</div>
        <div class="result-value">⏳ Виконую перевірку (${escapeHtml(getHealthCheckModeLabel_())})...</div>
      </div>
    `);

    let slowModeShown = false;

    const slowTimerId = setTimeout(() => {
      slowModeShown = true;

      setHtml('resultContent', `
        ${renderHealthCheckModeSwitcher_()}

        <div class="health-wrap">
          <div class="health-item warn sev-medium">
            <div class="health-title">⏳ Перевірка ще виконується</div>
            <div class="health-details">
              Сервер відповідає довше звичайного. Це не помилка — просто діагностика важка.
            </div>
          </div>
        </div>
      `);

      logToConsole('⏳ Health Check виконується довше звичайного...', 'warning');
    }, 15000);

    try {
      const reportResponse = await ActionDispatcher.run(
        'stage7HealthCheck',
        () => DiagnosticsApi.healthCheck(getHealthCheckOptions_()),
        { successMessage: '' } 
      );

      clearTimeout(slowTimerId);

      const report = reportResponse?.data || reportResponse;
      STATE.lastHealthReport = report || null;

      setHtml('resultContent', renderHealthReport(report));

      const grouped = splitHealthChecksByGroup(Array.isArray(report?.checks) ? report.checks : []);
      const overallOk = grouped.critical.length === 0 && grouped.warnings.length === 0;

      showToast(overallOk ? '✓ Система в нормі' : '⚠ Є проблеми — див. звіт');

      logToConsole(
        slowModeShown
          ? 'Перевірка системи завершена після тривалого очікування'
          : 'Перевірка системи завершена',
        overallOk ? 'success' : 'warning'
      );
    } catch (error) {
      clearTimeout(slowTimerId);

      setHtml('resultContent', `
        ${renderHealthCheckModeSwitcher_()}

        <div class="health-wrap">
          <div class="health-item bad sev-critical">
            <div class="health-title">✕ Помилка перевірки</div>
            <div class="health-details">${escapeHtml(normalizeError(error))}</div>
          </div>
        </div>
      `);

      showToast('✕ Помилка Health Check');
      logToConsole(`✕ Health Check: ${normalizeError(error)}`, 'error');
    }
  }

  async function runAllProjectTests() {
    assertAdminAction_('runAllProjectTests');
    showStandardResult('Всі тести проєкту');

    const runId = 'wasb_ui_project_tests_' + Date.now().toString(36);
    const chunkLimit = 1;
    const maxRuntimeMs = 120000;
    let offset = 0;
    let chunkNo = 0;
    let totalTasks = null;
    const chunks = [];

    function renderProgress(currentOffset, total, label) {
      const knownTotal = Number(total || 0);
      const pct = knownTotal > 0 ? Math.min(100, Math.round((Number(currentOffset || 0) / knownTotal) * 100)) : 0;
      setHtml('resultContent', `
        <div class="health-wrap">
          <div class="health-item warn sev-medium">
            <div class="health-title">⏳ Пакетний запуск тестів</div>
            <div class="health-details">
              ${escapeHtml(label || 'Виконую тести частинами, щоб не впертися у ліміт Google Apps Script.')}<br>
              Прогрес: ${escapeHtml(String(currentOffset || 0))}${knownTotal ? ' / ' + escapeHtml(String(knownTotal)) : ''} · ${escapeHtml(String(pct))}%
              <div style="height:7px; margin-top:8px; border-radius:999px; background:rgba(148,163,184,.25); overflow:hidden;">
                <div style="height:7px; width:${pct}%; background:var(--google-blue);"></div>
              </div>
            </div>
          </div>
        </div>
      `);
    }

    renderProgress(0, 0, 'Стартую перший пакет тестів...');
    logToConsole('⏳ Запуск всіх тестів проєкту пакетами...', 'warning');

    try {
      while (true) {
        chunkNo += 1;
        renderProgress(offset, totalTasks, `Виконую пакет #${chunkNo}. Це нормально: повний запуск розбитий на кілька коротких GAS-виконань.`);

        const chunkResponse = await ActionDispatcher.run(
          'stage7ProjectTestChunk',
          () => DiagnosticsApi.runProjectTestChunk({
            runId,
            offset,
            limit: chunkLimit,
            maxRuntimeMs,
            includeDiscovery: true,
            dryRun: true
          }),
          { successMessage: '', showLoader: chunkNo === 1 }
        );

        const chunk = chunkResponse?.data || chunkResponse;
        if (!chunk || !Array.isArray(chunk.checks)) {
          throw new Error('Порожня відповідь пакета тестів');
        }

        chunks.push(chunk);
        totalTasks = Number(chunk.totalTasks || totalTasks || 0);

        const nextOffset = Number(chunk.nextOffset || 0);
        if (nextOffset <= offset && chunk.done !== true) {
          throw new Error('Пакет тестів не просунув offset. Зупинено, щоб не зациклитися.');
        }

        offset = nextOffset;
        const partial = mergeProjectTestChunks_(chunks, false);
        STATE.lastProjectTestReport = partial;
        STATE.lastHealthReport = partial;

        renderProgress(offset, totalTasks, `Пакет #${chunkNo} завершено. PASS=${partial.counts.passed}, FAIL=${partial.counts.failed}, WARN=${partial.counts.warnings}, SKIP=${partial.counts.skipped}.`);
        logToConsole(`✓ Пакет тестів #${chunkNo}: offset=${offset}/${totalTasks || '?'}`, 'success');

        if (chunk.done === true || offset >= totalTasks) {
          break;
        }

        await new Promise(resolve => setTimeout(resolve, 350));
      }

      const report = mergeProjectTestChunks_(chunks, true);
      STATE.lastProjectTestReport = report || null;
      STATE.lastHealthReport = report || null;

      setHtml('resultContent', renderProjectTestReport(report));

      const failed = Number(report?.counts?.failed || 0);
      const warnings = Number(report?.counts?.warnings || 0);
      const skipped = Number(report?.counts?.skipped || 0);

      showToast(failed === 0 ? '✓ Тести завершено' : '✕ Є провалені тести');
      logToConsole(
        `Повний пакетний запуск тестів завершено: failed=${failed}, warnings=${warnings}, skipped=${skipped}`,
        failed === 0 ? (warnings > 0 || skipped > 0 ? 'warning' : 'success') : 'error'
      );
    } catch (error) {
      const partial = chunks.length ? mergeProjectTestChunks_(chunks, false) : null;
      if (partial) {
        STATE.lastProjectTestReport = partial;
        STATE.lastHealthReport = partial;
      }

      setHtml('resultContent', `
        <div class="health-wrap">
          <div class="health-item bad sev-critical">
            <div class="health-title">✕ Помилка запуску тестів</div>
            <div class="health-details">${escapeHtml(normalizeError(error))}</div>
          </div>
        </div>
        ${partial ? renderProjectTestReport(partial) : ''}
      `);
      showToast('✕ Помилка запуску тестів');
      logToConsole(`✕ All Project Tests: ${normalizeError(error)}`, 'error');
    }
  }

  function mergeProjectTestChunks_(chunks, done) {
    const list = Array.isArray(chunks) ? chunks.filter(Boolean) : [];
    const first = list[0] || {};
    const last = list[list.length - 1] || {};
    const checks = [];
    const results = [];
    const warnings = [];
    let durationMs = 0;
    let totalTasks = 0;

    list.forEach(chunk => {
      if (Array.isArray(chunk.checks)) checks.push(...chunk.checks);
      if (Array.isArray(chunk.results)) results.push(...chunk.results);
      if (Array.isArray(chunk.warnings)) warnings.push(...chunk.warnings);
      durationMs += Number(chunk.durationMs || 0);
      totalTasks = Math.max(totalTasks, Number(chunk.totalTasks || 0));
    });

    const counts = { total: checks.length, passed: 0, failed: 0, skipped: 0, warnings: 0, discovered: 0 };

    checks.forEach(check => {
      const status = String(check?.status || '').toUpperCase();
      if (status === 'OK' || status === 'PASS') counts.passed += 1;
      else if (status === 'FAIL' || status === 'ERROR' || status === 'CRITICAL' || status === 'BROKEN') counts.failed += 1;
      else if (status === 'WARN' || status === 'WARNING') counts.warnings += 1;
      else if (status === 'SKIPPED' || status === 'SKIP') counts.skipped += 1;
      else counts.warnings += 1;
      if (check?.discovered === true) counts.discovered += 1;
    });

    return {
      ok: counts.failed === 0,
      version: last.version || first.version || '',
      mode: 'project-chunked-ui',
      runId: first.runId || last.runId || '',
      startedAt: first.startedAt || '',
      finishedAt: last.finishedAt || '',
      durationMs,
      totalTasks,
      done: done === true,
      counts,
      checks,
      results,
      warnings: Array.from(new Set(warnings.filter(Boolean)))
    };
  }

  function renderProjectTestReport(report) {
    if (!report || !Array.isArray(report.checks)) {
      return '<div class="health-item warn">✕ Порожній звіт тестів</div>';
    }

    const checks = report.checks || [];
    const groups = splitHealthChecksByGroup(checks);
    const counts = report.counts || {};
    const failed = Number(counts.failed || groups.critical.length || 0);
    const warnings = Number(counts.warnings || groups.warnings.length || 0);
    const skipped = Number(counts.skipped || groups.pseudo.length || 0);
    const passed = Number(counts.passed || groups.ok.length || 0);
    const discovered = Number(counts.discovered || 0);
    const total = Number(counts.total || checks.length || 0);
    const hasProblems = failed > 0 || warnings > 0;

    return `
      <div class="compact-health-report">
        <div style="font-weight:600; margin-bottom:6px; padding:6px 8px; background:${hasProblems ? 'var(--warning-color)' : 'var(--success-color)'}20; border-radius:6px;">
          <span style="color:${hasProblems ? 'var(--warning-color)' : 'var(--success-color)'};">${hasProblems ? '⚠' : '✓'}</span>
          ${hasProblems ? 'Є проблеми у тестах' : 'Усі критичні тести пройдено'}
          <span style="float:right; font-size:0.65rem;">${total} запусків</span>
        </div>

        <div style="font-size:0.65rem; color:var(--text-secondary); margin-bottom:8px;">
          ${report.startedAt ? escapeHtml(new Date(report.startedAt).toLocaleString('uk-UA')) : ''}
          ${report.durationMs ? ` · ${escapeHtml(String(report.durationMs))} ms` : ''}
          ${report.runId ? ` · ${escapeHtml(report.runId)}` : ''}
        </div>

        <div style="font-size:0.68rem; margin-bottom:8px; display:flex; gap:8px; flex-wrap:wrap;">
          <span style="padding:2px 8px; border-radius:999px; background:rgba(34,197,94,.12); color:var(--success-color);">✓ PASS: ${passed}</span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(239,68,68,.12); color:var(--error-color);">✕ FAIL: ${failed}</span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(245,158,11,.12); color:var(--warning-color);">⚠ WARN: ${warnings}</span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(59,130,246,.12); color:var(--google-blue);">SKIP: ${skipped}</span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(59,130,246,.12); color:var(--google-blue);">DISC: ${discovered}</span>
        </div>

        <div class="result-item" style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="SidebarApp.runAllProjectTests()">⟲ Запустити всі тести ще раз</button>
          <button class="btn" onclick="SidebarApp.copyProjectTestReport()">📋 Копіювати звіт</button>
        </div>

        <div class="health-scroll-container" style="max-height:360px;">
          ${renderHealthGroup('Провалені тести', '✕', groups.critical, 'Провалених тестів немає')}
          ${renderHealthGroup('Попередження', '⚠', groups.warnings, 'Попереджень немає')}
          ${renderHealthGroup('Пропущені / compatibility', 'SKIP', groups.pseudo, 'Пропущених перевірок немає')}
          ${renderHealthGroup('Успішні тести', '✓', groups.ok, 'Успішних тестів немає')}
        </div>
      </div>
    `;
  }

  function copyProjectTestReport() {
    const report = STATE.lastProjectTestReport || STATE.lastHealthReport;

    if (!report || !Array.isArray(report.checks)) {
      showToast('⚠ Спочатку запустіть всі тести проєкту');
      return;
    }

    const checks = report.checks || [];
    const groups = splitHealthChecksByGroup(checks);
    const counts = report.counts || {};

    function appendGroup(text, title, items) {
      text += String(title || '') + '\n';
      text += '-'.repeat(String(title || '').length) + '\n';

      if (!items.length) {
        text += 'Немає\n\n';
        return text;
      }

      items.forEach(function(check) {
        const status = String(check?.status || '').toUpperCase();
        const ok = typeof check?.ok === 'boolean' ? check.ok : status === 'OK';
        const icon = ok ? '✓' : (status === 'WARN' ? '⚠' : (status === 'SKIPPED' ? 'SKIP' : '✕'));
        const name = check?.title || check?.name || 'Перевірка';
        const details = check?.details || check?.message || '';
        const recommendation = check?.howTo || check?.recommendation || '';

        text += icon + ' [' + (status || '?') + '] ' + name + '\n';
        if (details) text += '   Деталі: ' + String(details).replace(/\n/g, ' ') + '\n';
        if (recommendation) text += '   Як виправити: ' + String(recommendation).replace(/\n/g, ' ') + '\n';
        text += '\n';
      });

      return text;
    }

    let text = 'WASB PROJECT TESTS ЗВІТ\n========================\n';
    text += 'Час: ' + (report.startedAt ? new Date(report.startedAt).toLocaleString('uk-UA') : new Date().toLocaleString('uk-UA')) + '\n';
    text += 'RunId: ' + (report.runId || '') + '\n';
    text += 'Статус: ' + (report.ok ? '✓ PASS' : '✕ FAIL') + '\n';
    text += 'Total: ' + (counts.total || checks.length) +
      ' | Passed: ' + (counts.passed || 0) +
      ' | Failed: ' + (counts.failed || 0) +
      ' | Warnings: ' + (counts.warnings || 0) +
      ' | Skipped: ' + (counts.skipped || 0) +
      ' | Discovered: ' + (counts.discovered || 0) + '\n\n';

    text = appendGroup(text, 'ПРОВАЛЕНІ ТЕСТИ', groups.critical);
    text = appendGroup(text, 'ПОПЕРЕДЖЕННЯ', groups.warnings);
    text = appendGroup(text, 'ПРОПУЩЕНІ / COMPATIBILITY', groups.pseudo);
    text = appendGroup(text, 'УСПІШНІ ТЕСТИ', groups.ok);

    copyResultText(text);
  }

  function splitHealthChecksByGroup(checks) {
    const groups = {
      critical: [],
      warnings: [],
      pseudo: [],
      ok: []
    };

    (checks || []).forEach(function(check) {
      const status = String(check?.status || '').toUpperCase();
      const ok = typeof check?.ok === 'boolean' ? check.ok : status === 'OK';
      const uiGroup = String(check?.uiGroup || '').toLowerCase();

      if (uiGroup === 'critical' || uiGroup === 'warnings' || uiGroup === 'pseudo' || uiGroup === 'ok') {
        groups[uiGroup].push(check);
        return;
      }

      if (uiGroup === 'compatibility' || status === 'PSEUDO') {
        groups.pseudo.push(check);
        return;
      }

      const title = String(check?.title || check?.name || '').toLowerCase();
      const details = String(check?.details || check?.message || '').toLowerCase();
      const looksCompatibility =
        title.indexOf('deprecated ') === 0 ||
        title.indexOf('compatibility ') === 0 ||
        title.indexOf('wrapper source ') === 0 ||
        title.indexOf('ui-ban marker ') === 0 ||
        details.indexOf('compatibility-only') !== -1 ||
        details.indexOf('замінити на ') !== -1;

      if (looksCompatibility) {
        groups.pseudo.push(check);
        return;
      }

      if (ok) {
        groups.ok.push(check);
        return;
      }

      if (status === 'FAIL') {
        groups.critical.push(check);
        return;
      }

      groups.warnings.push(check);
    });

    return groups;
  }

  function renderHealthGroup(title, icon, items, emptyText) {
    if (!items || !items.length) {
      return `
        <div class="health-group">
          <div class="health-group-title">
            <span>${icon}</span>
            <span>${escapeHtml(title)}</span>
            <span class="health-group-count">0</span>
          </div>
          <div class="health-item ok" style="opacity:.85;">
            ${escapeHtml(emptyText || 'Немає')}
          </div>
        </div>
      `;
    }

    return `
      <div class="health-group">
        <div class="health-group-title">
          <span>${icon}</span>
          <span>${escapeHtml(title)}</span>
          <span class="health-group-count">${items.length}</span>
        </div>
        <div class="health-group-body">
          ${items.map(renderCheckItemCompact).join('')}
        </div>
      </div>
    `;
  }
  function renderCheckItemCompact(check) {
    const status = String(check?.status || '').toUpperCase();
    const ok = typeof check?.ok === 'boolean' ? check.ok : status === 'OK';
    const isPseudo = status === 'PSEUDO';
    const icon = isPseudo ? '🧩' : (ok ? '✓' : (status === 'WARN' ? '⚠' : '✕'));
    const title = check?.title || check?.name || 'Перевірка';
    const details = check?.details || check?.message || '';
    const recommendation = check?.howTo || check?.recommendation || '';
    const cssClass = isPseudo ? 'pseudo' : (ok ? 'ok' : (status === 'FAIL' ? 'bad' : 'warn'));
    const noteLabel = isPseudo ? 'Примітка' : 'Як виправити';

    return `
      <div class="health-item ${cssClass}" style="margin:4px 0; padding:6px;">
        <div class="health-title">
          ${icon} ${escapeHtml(title)}
          <span class="health-badges">[${escapeHtml(status || '?')}]</span>
        </div>
        ${details ? `<div class="health-details">${escapeHtml(details)}</div>` : ''}
        ${recommendation ? `<div class="how-to-box" style="${isPseudo ? 'border-left-color: var(--google-blue);' : ''}"><strong>${noteLabel}:</strong> ${escapeHtml(recommendation)}</div>` : ''}
      </div>
    `;
  }

  function renderCheckItem(check) {
    return renderCheckItemCompact(check);
  }
  function renderHealthReport(report) {
    if (!report || !report.checks) {
      return `
        ${renderHealthCheckModeSwitcher_()}
        <div class="health-item warn">✕ Порожній звіт</div>
      `;
    }

    const checks = Array.isArray(report.checks) ? report.checks : [];
    const groups = splitHealthChecksByGroup(checks);

    const criticalCount = groups.critical.length;
    const warningCount = groups.warnings.length;
    const pseudoCount = groups.pseudo.length;
    const okCount = groups.ok.length;

    const hasRealProblems = criticalCount > 0 || warningCount > 0;
    const statusIcon = hasRealProblems ? '⚠' : '✓';
    const statusColor = hasRealProblems ? 'var(--warning-color)' : 'var(--success-color)';

    return `
      ${renderHealthCheckModeSwitcher_()}

      <div class="compact-health-report">
        <div style="font-weight:600; margin-bottom:6px; padding:6px 8px; background:${statusColor}20; border-radius:6px;">
          <span style="color:${statusColor};">${statusIcon}</span>
          ${hasRealProblems ? 'Є проблеми' : 'Все добре'}
          <span style="float:right; font-size:0.65rem;">${checks.length} перевірок</span>
        </div>

        <div style="font-size:0.65rem; color:var(--text-secondary); margin-bottom:8px;">
          ${report.ts ? escapeHtml(new Date(report.ts).toLocaleString('uk-UA')) : ''}
        </div>

        <div style="font-size:0.68rem; margin-bottom:8px; display:flex; gap:8px; flex-wrap:wrap;">
          <span style="padding:2px 8px; border-radius:999px; background:rgba(34,197,94,.12); color:var(--success-color);">
            ✓ OK: ${okCount}
          </span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(239,68,68,.12); color:var(--error-color);">
            ✕ Критичні: ${criticalCount}
          </span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(245,158,11,.12); color:var(--warning-color);">
            ⚠ Попередження: ${warningCount}
          </span>
          <span style="padding:2px 8px; border-radius:999px; background:rgba(59,130,246,.12); color:var(--google-blue);">
            🧩 PSEUDO: ${pseudoCount}
          </span>
        </div>

        <div class="result-item" style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="SidebarApp.runHealthCheck()">⟲ Перевірити ще раз</button>
          <button class="btn" onclick="SidebarApp.copyHealthReport()">📋 Копіювати звіт</button>
        </div>

        <div class="health-scroll-container" style="max-height:320px;">
          ${renderHealthGroup('Критичні проблеми', '✕', groups.critical, 'Критичних проблем не знайдено')}
          ${renderHealthGroup('Попередження', '⚠', groups.warnings, 'Попереджень немає')}
          ${renderHealthGroup('PSEUDO / compatibility layer', '🧩', groups.pseudo, 'Нейтральний compatibility layer не виявлено')}
          ${renderHealthGroup('Успішні перевірки', '✓', groups.ok, 'Успішних перевірок немає')}
        </div>
      </div>
    `;
  }
  function copyHealthReport() {
    const report = STATE.lastHealthReport;

    if (!report || !Array.isArray(report.checks)) {
      showToast('⚠ Спочатку натисніть "Перевірити"');
      return;
    }

    const checks = report.checks;
    const groups = splitHealthChecksByGroup(checks);
    const overallOk = groups.critical.length === 0 && groups.warnings.length === 0;

    function appendGroup(text, title, items) {
      text += `${title}\n`;
      text += `${'-'.repeat(title.length)}\n`;

      if (!items.length) {
        text += `Немає\n\n`;
        return text;
      }

      items.forEach(function(check) {
        const status = String(check?.status || '').toUpperCase();
        const ok = typeof check?.ok === 'boolean' ? check.ok : status === 'OK';
        const isPseudo = status === 'PSEUDO';
        const icon = isPseudo ? '🧩' : (ok ? '✓' : (status === 'WARN' ? '⚠' : '✕'));
        const name = check?.title || check?.name || 'Перевірка';
        const details = check?.details || check?.message || '';
        const recommendation = check?.howTo || check?.recommendation || '';

        text += `${icon} [${status || '?'}] ${name}\n`;
        if (details) text += `   Деталі: ${details}\n`;
        if (recommendation) text += `   ${isPseudo ? 'Примітка' : 'Як виправити'}: ${String(recommendation).replace(/\n/g, ' ')}\n`;
        text += `\n`;
      });

      return text;
    }

    let text = 'HEALTH CHECK ЗВІТ\n==================\n';
    text += `Час: ${report.ts ? new Date(report.ts).toLocaleString('uk-UA') : new Date().toLocaleString('uk-UA')}\n`;
    text += `Режим: ${getHealthCheckModeLabel_()}\n`;
    text += `Статус: ${overallOk ? '✓ ОК' : '⚠ Є ПРОБЛЕМИ'}\n`;
    text += `OK: ${groups.ok.length} | Критичні: ${groups.critical.length} | Попередження: ${groups.warnings.length} | PSEUDO: ${groups.pseudo.length}\n\n`;

    text = appendGroup(text, 'КРИТИЧНІ ПРОБЛЕМИ', groups.critical);
    text = appendGroup(text, 'ПОПЕРЕДЖЕННЯ', groups.warnings);
    text = appendGroup(text, 'PSEUDO / COMPATIBILITY', groups.pseudo);
    text = appendGroup(text, 'УСПІШНІ ПЕРЕВІРКИ', groups.ok);

    copyResultText(text);
  }
</script>

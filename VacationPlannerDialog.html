<!DOCTYPE html>
<html lang="uk">
  <head>
    <title>Підбір дат відпустки</title>
    <base target="_top">
    <style>
      body {
        color: #202124;
        font-family: Arial, sans-serif;
        padding: 18px;
      }
      h3 {
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-top: 12px;
      }
      input,
      select {
        box-sizing: border-box;
        margin-top: 5px;
        padding: 8px;
        width: 100%;
      }
      button {
        background: #188038;
        border: 0;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        margin-top: 20px;
        padding: 10px 16px;
        width: 100%;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      #status {
        margin-top: 14px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h3>Підбір оптимальних дат відпустки</h3>

    <label for="fml">ФІО</label>
    <input id="fml" type="text" placeholder="Прізвище Ім'я По батькові">

    <label for="vacationNumber">Тип відпустки</label>
    <select id="vacationNumber">
      <option value="1">Перша відпустка</option>
      <option value="2">Друга відпустка</option>
    </select>

    <label for="desiredStart">Бажана дата початку</label>
    <input id="desiredStart" type="date">

    <label for="durationDays">Тривалість, днів</label>
    <input id="durationDays" type="number" value="15" min="1" max="60">

    <label for="searchWindow">Вікно пошуку до і після, днів</label>
    <input id="searchWindow" type="number" value="30" min="0" max="180">

    <button id="submit" type="button" onclick="submitPlanner()">
      Підібрати варіанти
    </button>
    <div id="status"></div>

    <script>
      function submitPlanner() {
        var button = document.getElementById("submit");
        var status = document.getElementById("status");
        button.disabled = true;
        status.textContent = "Підбираємо найкращі дати...";

        google.script.run
          .withSuccessHandler(function (result) {
            button.disabled = false;
            status.textContent = result.optionCount
              ? "Знайдено варіантів: " +
                result.optionCount +
                ". Перевірте VACATION_OPTIONS."
              : "Допустимих варіантів не знайдено. Причини записані у VACATION_OPTIONS.";
          })
          .withFailureHandler(function (error) {
            button.disabled = false;
            status.textContent =
              "Помилка: " + (error && error.message ? error.message : error);
          })
          .processVacationPlannerRequest({
            fml: document.getElementById("fml").value,
            vacationNumber: Number(
              document.getElementById("vacationNumber").value,
            ),
            desiredStart: document.getElementById("desiredStart").value,
            durationDays: Number(document.getElementById("durationDays").value),
            searchWindow: Number(document.getElementById("searchWindow").value),
          });
      }
    </script>
  </body>
</html>

<script>
  var UiState = {
    patch(values = {}) {
      Object.assign(STATE, values || {});
      return STATE;
    },
    invalidate(keys = []) {
      return Array.isArray(keys) ? keys.slice() : [keys];
    },
  };

  if (typeof STATE.panelRefreshSeq !== "number") STATE.panelRefreshSeq = 0;
  if (typeof STATE.panelRefreshInProgress !== "boolean")
    STATE.panelRefreshInProgress = false;
  if (!Array.isArray(STATE.lastNonEmptyPanelData))
    STATE.lastNonEmptyPanelData = [];
  if (typeof STATE.lastPanelDataUpdatedAt !== "number")
    STATE.lastPanelDataUpdatedAt = 0;

  var LoaderService = {
    show: () => showLoading(),
    hide: () => hideLoading(),
  };

  var ToastService = {
    success: (message) => showToast(message),
    warning: (message) => showToast(message),
    error: (message) => showToast(message),
  };

  var ErrorPresenter = {
    present: (error) => handleError(error),
  };

  var RenderCoordinator = {
    async sync(meta = {}) {
      const syncMeta = meta?.sync || meta || {};
      const refresh = Array.isArray(syncMeta.refresh) ? syncMeta.refresh : [];

      if (syncMeta.currentMonth) {
        UiState.patch({ currentMonth: syncMeta.currentMonth });
        updateMonthBadge(syncMeta.currentMonth);
      }

      if (refresh.includes("monthsList") || refresh.includes("currentMonth")) {
        try {
          const monthsResult = await Stage7Api.getMonths();
          if (monthsResult?.success) {
            UiState.patch({
              monthsList: Array.isArray(monthsResult.months)
                ? monthsResult.months
                : STATE.monthsList,
              currentMonth: monthsResult.current || STATE.currentMonth,
            });
            updateMonthBadge(monthsResult.current || STATE.currentMonth);
          }
        } catch (_) {}
      }

      if (refresh.includes("panel")) {
        try {
          await refreshSendPanelDataFromServer({
            silent: true,
            preserveNonEmpty: true,
            retries: 2,
            retryDelayMs: 450,
            reason: "RenderCoordinator.sync",
          });
        } catch (_) {}
      }

      return true;
    },
  };

  var ActionDispatcher = {
    async run(methodName, handler, options = {}) {
      const opts = options || {};
      const label =
        (typeof getActionName === "function"
          ? getActionName(methodName)
          : null) || String(methodName || "дія");

      try {
        if (typeof logToConsole === "function") {
          logToConsole("▶ Дія: " + label, "action", { channel: "action" });
        }
      } catch (_) {}

      if (opts.showLoader !== false) LoaderService.show();

      try {
        const result = await handler();

        if (result?.success !== false) {
          await RenderCoordinator.sync(
            result?.meta || result?.data?.meta || result?.raw?.data?.meta || {},
          );
        }

        if (result?.success && opts.successMessage) {
          ToastService.success(opts.successMessage);
        }

        try {
          if (typeof logToConsole === "function") {
            if (result?.success === false) {
              logToConsole(
                "✕ Дія: " +
                  label +
                  " — " +
                  String(result?.error || result?.message || "помилка"),
                "error",
                { channel: "action" },
              );
            } else {
              logToConsole("■ Дія: " + label + " — завершено", "success", {
                channel: "action",
              });
            }
          }
        } catch (_) {}

        return result;
      } catch (error) {
        try {
          if (typeof logToConsole === "function") {
            logToConsole(
              "✕ Дія: " + label + " — " + normalizeError(error),
              "error",
              { channel: "action" },
            );
          }
        } catch (_) {}
        ErrorPresenter.present(error);
        throw error;
      } finally {
        if (opts.showLoader !== false) LoaderService.hide();
      }
    },
  };

  function stopSending() {
    STATE._sendingCancelled = true;
    if (STATE.sendingInterval) {
      clearTimeout(STATE.sendingInterval);
      STATE.sendingInterval = null;
    }
  }

  function clonePanelRows_(rows) {
    return Array.isArray(rows)
      ? rows.map((item) =>
          item && typeof item === "object" ? Object.assign({}, item) : item,
        )
      : [];
  }

  function setCurrentPanelData(panelData, options = {}) {
    const rows = clonePanelRows_(panelData);
    const preserveLastNonEmpty = options.preserveLastNonEmpty !== false;

    STATE.currentPanelData = rows;

    if (preserveLastNonEmpty && rows.length > 0) {
      STATE.lastNonEmptyPanelData = clonePanelRows_(rows);
      STATE.lastPanelDataUpdatedAt = Date.now();
    }

    updateSendUnsentButtonState();
    return STATE.currentPanelData;
  }

  async function ensurePanelDataLoadedFromServer(options = {}) {
    const opts = Object.assign(
      {
        silent: true,
        preserveNonEmpty: false,
        retries: 2,
        retryDelayMs: 450,
        reason: "ensure-panel-data",
      },
      options || {},
    );

    const currentRows = Array.isArray(STATE.currentPanelData)
      ? STATE.currentPanelData
      : [];
    if (currentRows.length > 0 && !opts.force) return currentRows;

    const result = await refreshSendPanelDataFromServer(opts);
    if (result?.success) {
      return Array.isArray(STATE.currentPanelData)
        ? STATE.currentPanelData
        : [];
    }

    throw new Error(result?.error || "Не вдалося оновити панель надсилання");
  }

  function getReadyPanelItems(panelData = STATE.currentPanelData) {
    const data = Array.isArray(panelData) ? panelData : [];
    return data.filter(
      (item) =>
        item && item.link && !item.sent && item.status === PANEL_READY_STATUS,
    );
  }

  function getPanelErrorItems(panelData = STATE.currentPanelData) {
    const data = Array.isArray(panelData) ? panelData : [];
    return data.filter((item) => item && item.status !== PANEL_READY_STATUS);
  }

  function updateSendUnsentButtonState() {
    const sendBtn = $id("sendUnsentBtn");
    if (!sendBtn) return;

    const panelData = Array.isArray(STATE.currentPanelData)
      ? STATE.currentPanelData
      : [];
    if (!panelData.length) {
      sendBtn.disabled = false;
      sendBtn.title = "Оновити панель надсилання або створити панель";
      return;
    }

    const unsentCount = getReadyPanelItems(panelData).length;
    sendBtn.disabled = unsentCount === 0;
    sendBtn.title =
      unsentCount > 0
        ? `Відправити ${unsentCount} повідомлень`
        : "Немає невідправлених";
  }

  function waitMs_(ms) {
    return new Promise((resolve) =>
      setTimeout(resolve, Math.max(0, Number(ms || 0))),
    );
  }

  async function refreshSendPanelDataFromServer(options = {}) {
    const {
      silent = false,
      preserveNonEmpty = true,
      retries = 2,
      retryDelayMs = 450,
      reason = "manual-refresh",
    } = options;

    const refreshToken = ++STATE.panelRefreshSeq;
    STATE.panelRefreshInProgress = true;

    let lastFailure = null;

    try {
      for (let attempt = 0; attempt <= retries; attempt++) {
        const result = await Stage7Api.getSendPanelData();

        if (!result?.success) {
          lastFailure = new Error(
            result?.error || "Не вдалося оновити панель надсилання",
          );
          break;
        }

        const rows = Array.isArray(result.data) ? result.data : [];
        const hasRows = rows.length > 0;

        const currentRows = Array.isArray(STATE.currentPanelData)
          ? STATE.currentPanelData
          : [];
        const currentHasRows = currentRows.length > 0;

        if (refreshToken !== STATE.panelRefreshSeq) {
          return result;
        }

        if (hasRows || !preserveNonEmpty || !currentHasRows) {
          setCurrentPanelData(rows);

          if (!silent) {
            logToConsole(`⟲ Панель надсилання синхронізовано (${reason})`, "info");
          }

          return result;
        }

        if (attempt < retries) {
          if (!silent) {
            logToConsole(
              `⏳ Панель надсилання ще перебудовується, повторна спроба ${attempt + 2}/${retries + 1}`,
              "warning",
            );
          }

          await waitMs_(retryDelayMs * (attempt + 1));
          continue;
        }

        const fallbackRows =
          Array.isArray(STATE.lastNonEmptyPanelData) &&
          STATE.lastNonEmptyPanelData.length
            ? STATE.lastNonEmptyPanelData
            : currentRows;

        setCurrentPanelData(fallbackRows, { preserveLastNonEmpty: true });

        if (!silent) {
          logToConsole(
            "⚠ Сервер тимчасово повернув порожню панель надсилання — залишаю останні непорожні дані",
            "warning",
          );
        }

        return Object.assign({}, result, {
          data: clonePanelRows_(fallbackRows),
          rows: clonePanelRows_(fallbackRows),
          totalCount: fallbackRows.length,
        });
      }

      throw lastFailure || new Error("Не вдалося оновити панель надсилання");
    } finally {
      if (refreshToken === STATE.panelRefreshSeq) {
        STATE.panelRefreshInProgress = false;
      }
    }
  }

  function primeWhatsAppSenderTab() {
    if (STATE.DIAG_TEST_MODE) return null;
    try {
      const existing = STATE.waSenderWindow;
      if (existing && !existing.closed) return existing;
    } catch (error) {
      console.error("primeWhatsAppSenderTab error:", error);
    }
    return null;
  }

  function openLinkSafe(url) {
    try {
      const link = String(url || "").trim();
      if (!link) return null;
      if (STATE.DIAG_TEST_MODE) return { closed: false, focus() {} };

      const guard = STATE._linkOpenGuard || { url: "", openedAt: 0 };
      const now = Date.now();
      let currentWindow = null;

      try {
        currentWindow =
          STATE.waSenderWindow && !STATE.waSenderWindow.closed
            ? STATE.waSenderWindow
            : null;
      } catch (_) {
        currentWindow = null;
      }
      STATE.waSenderWindow = currentWindow;

      if (
        guard.url === link &&
        now - Number(guard.openedAt || 0) < 1500 &&
        currentWindow
      ) {
        try {
          currentWindow.focus();
        } catch (_) {}
        return currentWindow;
      }

      const existing = primeWhatsAppSenderTab();
      if (existing && !existing.closed) {
        try {
          existing.location.replace(link);
          try {
            existing.opener = null;
          } catch (_) {}
          existing.focus();
          STATE.waSenderWindow = existing;
          STATE._linkOpenGuard = { url: link, openedAt: now };
          return existing;
        } catch (_) {}
      }

      const targetName = String(
        STATE.waSenderWindowName || WA_SENDER_TARGET || "WA_SENDER_WINDOW",
      );
      const opened = window.open(link, targetName);
      if (opened) {
        try {
          opened.opener = null;
        } catch (_) {}
        try {
          opened.focus();
        } catch (_) {}
        STATE.waSenderWindow = opened;
        STATE._linkOpenGuard = { url: link, openedAt: now };
        return opened;
      }

      const anchor = document.createElement("a");
      anchor.href = link;
      anchor.target = targetName;
      anchor.rel = "noreferrer";
      anchor.style.display = "none";
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      STATE._linkOpenGuard = { url: link, openedAt: now };
      return { closed: false, focus() {} };
    } catch (error) {
      console.error("openLinkSafe error:", error);
      try {
        const fallbackUrl = String(url || "").trim();
        if (!fallbackUrl) return null;
        const targetName = String(
          STATE.waSenderWindowName || WA_SENDER_TARGET || "WA_SENDER_WINDOW",
        );
        const fallback = window.open(fallbackUrl, targetName);
        if (fallback) {
          try {
            fallback.opener = null;
          } catch (_) {}
          try {
            fallback.focus();
          } catch (_) {}
          STATE.waSenderWindow = fallback;
          STATE._linkOpenGuard = { url: fallbackUrl, openedAt: Date.now() };
          return fallback;
        }

        const anchor = document.createElement("a");
        anchor.href = fallbackUrl;
        anchor.target = targetName;
        anchor.rel = "noreferrer";
        anchor.style.display = "none";
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        STATE._linkOpenGuard = { url: fallbackUrl, openedAt: Date.now() };
        return { closed: false, focus() {} };
      } catch (_) {
        return null;
      }
    }
  }

  function formatPhone(phone) {
    if (!phone || phone === "—") return "—";

    let cleaned = String(phone).replace(/[^\d+]/g, "");

    if (cleaned.startsWith("380") && !cleaned.startsWith("+"))
      cleaned = "+" + cleaned;
    if (cleaned.startsWith("0") && cleaned.length === 10)
      cleaned = "+38" + cleaned;

    if (cleaned.startsWith("+380") && cleaned.length === 13) {
      const operator = cleaned.slice(4, 6);
      const part1 = cleaned.slice(6, 9);
      const part2 = cleaned.slice(9, 11);
      const part3 = cleaned.slice(11, 13);
      return `+380 ${operator} ${part1} ${part2} ${part3}`;
    }

    return cleaned;
  }

  function formatDateForDisplay(value) {
    if (!value) return "";
    if (typeof value === "string") {
      const text = value.trim();
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) {
        return text;
      }
      if (/\d{4}-\d{2}-\d{2}/.test(text)) {
        return text.replace(
          /\b(\d{4})-(\d{2})-(\d{2})\b/g,
          function (_, year, month, day) {
            return `${day}.${month}.${year}`;
          },
        );
      }
    }
    const date = value instanceof Date ? value : new Date(value);
    if (!Number.isNaN(date.getTime())) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}.${month}.${year}`;
    }
    return String(value);
  }

  function hidePersonCard() {
    hide("personCardContainer");
  }

  function showPersonCardContainer() {
    show("personCardContainer", "block");
  }

  function hideToast() {
    const toast = $id("appToast");
    if (!toast) return;
    clearTimeout(window.__toastTimer__);
    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(6px)";
    toast.textContent = "";
  }

  function showToast(message) {
    const msg = String(message || "").trim();
    if (!msg) return;

    let toast = $id("appToast");

    if (!toast) {
      toast = document.createElement("div");
      toast.id = "appToast";
      toast.style.position = "fixed";
      toast.style.left = "50%";
      toast.style.bottom = "10px";
      toast.style.transform = "translateX(-50%) translateY(6px)";
      toast.style.zIndex = "9999";
      toast.style.padding = "8px 10px";
      toast.style.borderRadius = "12px";
      toast.style.background = "var(--toast-bg)";
      toast.style.color = "var(--toast-text)";
      toast.style.fontSize = "12px";
      toast.style.lineHeight = "1.35";
      toast.style.boxShadow = "0 4px 10px rgba(0,0,0,0.18)";
      toast.style.width = "auto";
      toast.style.maxWidth = "min(240px, calc(100% - 28px))";
      toast.style.minWidth = "0";
      toast.style.textAlign = "center";
      toast.style.whiteSpace = "normal";
      toast.style.wordBreak = "break-word";
      toast.style.pointerEvents = "none";
      toast.style.opacity = "0";
      toast.style.display = "block";
      toast.style.transition = "opacity .16s ease, transform .16s ease";
      document.body.appendChild(toast);
    }

    toast.textContent = msg;
    toast.style.opacity = "1";
    toast.style.transform = "translateX(-50%) translateY(0)";

    clearTimeout(window.__toastTimer__);
    window.__toastTimer__ = setTimeout(() => {
      hideToast();
    }, 1400);
  }

  function showMenu() {
    try {
      if (typeof logToConsole === "function") {
        logToConsole("🖥 Екран: Головне меню", "info");
      }
    } catch (_) {}

    flashScreenTransition_("Повернення до меню...");

    $id("menuSection")?.classList?.add("active");
    $id("resultSection")?.classList?.remove("active");

    stopSending();
    hidePersonCard();
    show("resultContent", "block");
  }

  function showResult(title) {
    try {
      if (typeof logToConsole === "function") {
        logToConsole("🖥 Екран: " + String(title || "Результат"), "info");
      }
    } catch (_) {}

    flashScreenTransition_("Завантаження екрана...");

    $id("menuSection")?.classList?.remove("active");
    $id("resultSection")?.classList?.add("active");
    setText("resultTitle", title || "Результат");
  }

  function showStandardResult(title) {
    hidePersonCard();
    show("resultContent", "block");
    showResult(title);
  }

  function showCardResult(title) {
    hide("resultContent");
    showPersonCardContainer();
    showResult(title);
  }

  var SIDEBAR_BOOT_TIMEOUT_MS = 20000;
  var SIDEBAR_API_TIMEOUT_MS = 15000;
  var __wasbSidebarBootTimeoutId = null;
  var __wasbSidebarBootGeneration = 0;

  function startSidebarBootTimeout(ms) {
    stopSidebarBootTimeout();
    var timeoutMs = Math.max(5000, Number(ms) || SIDEBAR_BOOT_TIMEOUT_MS);
    var generation = ++__wasbSidebarBootGeneration;

    __wasbSidebarBootTimeoutId = setTimeout(function () {
      if (generation !== __wasbSidebarBootGeneration) return;
      try {
        console.error("[WASB] sidebar bootstrap timeout");
      } catch (_) {}
      try {
        showFatalSidebarError(
          new Error(
            "Sidebar не завантажився за " +
              Math.round(timeoutMs / 1000) +
              " секунд",
          ),
        );
      } catch (_) {}
      try {
        hideLoading();
      } catch (_) {}
    }, timeoutMs);
  }

  function stopSidebarBootTimeout() {
    __wasbSidebarBootGeneration += 1;
    if (__wasbSidebarBootTimeoutId) {
      clearTimeout(__wasbSidebarBootTimeoutId);
      __wasbSidebarBootTimeoutId = null;
    }
  }

  function showFatalSidebarError(error) {
    var message = normalizeError(error);
    try {
      logToConsole("[WASB] " + message, "error");
    } catch (_) {}
    try {
      if (typeof showToast === "function") {
        showToast("Помилка завантаження панелі: " + message);
      }
    } catch (_) {}
  }

  function setLoadingOverlayText(message) {
    const loadingTextEl = document.querySelector(
      "#loadingOverlay .loading-text",
    );
    if (!loadingTextEl) return;
    loadingTextEl.textContent = String(message || "Завантаження...");
  }

  function showLoading(message, options = {}) {
    const opts = options || {};
    const overlay = $id("loadingOverlay");
    const text = String(message || "Завантаження...");

    setLoadingOverlayText(text);

    if (typeof STATE === "object" && STATE) {
      STATE._loadingToken = Number(STATE._loadingToken || 0) + 1;
      if (!opts.overlayOnly) {
        STATE._loadingDepth = Number(STATE._loadingDepth || 0) + 1;
        if (STATE._loadingDepth === 1) {
          STATE._loadingStartedAt = Date.now();
        }
      }
    }

    if (overlay) {
      overlay.classList.toggle("is-transition", opts.kind === "transition");
      overlay.setAttribute("aria-label", text);
    }

    if (!opts.overlayOnly && !opts.silentLog) {
      try {
        if (typeof logToConsole === "function") {
          const depth = Number(STATE._loadingDepth || 1);
          if (depth <= 1) {
            logToConsole("⏳ " + text, "loading");
          } else {
            logToConsole("  ↳ " + text, "loading");
          }
        }
      } catch (_) {}
    }

    show("loadingOverlay", "flex");

    if (typeof syncConsoleOverlayState_ === "function") {
      syncConsoleOverlayState_();
    }
  }

  function hideLoading(options = {}) {
    const opts = options || {};
    const overlay = $id("loadingOverlay");
    setLoadingOverlayText("Завантаження...");
    if (overlay) {
      overlay.classList.remove("is-transition");
      overlay.removeAttribute("aria-label");
    }
    hide("loadingOverlay");

    if (typeof STATE === "object" && STATE && !opts.overlayOnly) {
      const depth = Number(STATE._loadingDepth || 0);
      if (depth > 0) STATE._loadingDepth = depth - 1;

      if (Number(STATE._loadingDepth || 0) <= 0) {
        STATE._loadingDepth = 0;
        const started = Number(STATE._loadingStartedAt || 0);
        const ms = started ? Date.now() - started : 0;
        const suffix = ms > 0 ? " (" + ms + " мс)" : "";
        try {
          if (typeof logToConsole === "function") {
            logToConsole("✓ Завантаження завершено" + suffix, "success");
          }
        } catch (_) {}
        STATE._loadingStartedAt = 0;
      }
    }

    if (typeof syncConsoleOverlayState_ === "function") {
      syncConsoleOverlayState_();
    }
  }

  function flashScreenTransition_(message, durationMs) {
    if (!$id("loadingOverlay")) return;

    const ms = Math.max(120, Math.min(420, Number(durationMs || 220)));
    showLoading(message || "Завантаження екрана...", {
      kind: "transition",
      overlayOnly: true,
    });

    const token = STATE && Number(STATE._loadingToken || 0);
    clearTimeout(window.__wasbScreenTransitionTimer__);
    window.__wasbScreenTransitionTimer__ = setTimeout(function () {
      if (!STATE || Number(STATE._loadingToken || 0) === token) {
        hideLoading({ overlayOnly: true });
      }
    }, ms);
  }
</script>

<script>
  // Js.Security.Boot — polyfills and shared STATE for access UI.
  if (typeof window.$id !== "function") {
    window.$id = function (id) {
      return document.getElementById(id);
    };
  }

  if (typeof window.escapeHtml !== "function") {
    window.escapeHtml = function (value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    };
  }

  if (typeof window.escapeJsString !== "function") {
    window.escapeJsString = function (value) {
      return String(value == null ? "" : value)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n");
    };
  }

  if (typeof window.getActionName !== "function") {
    window.getActionName = function (actionName) {
      const map = {
        daySummary: "Зведення за день",
        detailedDay: "Детальне зведення",
        generatePanel: "Згенерувати панель надсилання",
        sendUnsent: "Відправити невідправлені",
        createNextMonth: "Створити наступний місяць",
        switchMonth: "Переключити місяць",
        vacationReminder: "Перевірка відпусток",
        vacations: "Відпустки",
        birthdayCheck: "Перевірка днів народження",
        debugPhones: "Діагностика телефонів",
        healthCheck: "Перевірка системи",
        runAllProjectTests: "Всі тести проєкту",
        pendingRepairs: "Список repair-операцій",
        operationDetails: "Деталі операції",
        runRepair: "Запустити repair",
        clearLog: "Очистити журнал дій",
        clearCache: "Очистити кеш",
        clearPhoneCache: "Очистити кеш телефонів",
        restartBot: "Перезапустити бота",
        applyProtections: "Застосувати захист",
        previewProtections: "Переглянути захист листів",
        bootstrapRuntime: "Створити службові листи",
        bootstrapAccess: "Ініціалізувати лист доступу",
        runRegressionTests: "Регресійні тести",
        setupTrigger: "Налаштувати тригер",
        cleanupTriggers: "Прибрати дублікати тригерів",
      };
      return (
        map[String(actionName || "")] || String(actionName || "Невідома дія")
      );
    };
  }

  if (typeof window.normalizeError !== "function") {
    window.normalizeError = function (error) {
      if (!error) return "Невідома помилка";
      if (typeof error === "string") return error;
      if (error.message) return error.message;
      try {
        return JSON.stringify(error);
      } catch (_) {
        return String(error);
      }
    };
  }

  if (!window.__wasbConsoleBuffer__) {
    window.__wasbConsoleBuffer__ = [];
  }
  if (typeof window.__wasbConsoleUnread !== "number") {
    window.__wasbConsoleUnread = 0;
  }

  window.__wasbPushConsoleLog__ = function (message, type, meta) {
    var entry = {
      message: String(message == null ? "" : message),
      type: type || "info",
      ts: Date.now(),
      channel:
        meta && meta.channel
          ? String(meta.channel)
          : typeof inferConsoleLogChannel_ === "function"
            ? inferConsoleLogChannel_(type || "info", message)
            : "",
    };
    window.__wasbConsoleBuffer__.push(entry);
    if (window.__wasbConsoleBuffer__.length > 500) {
      window.__wasbConsoleBuffer__.shift();
    }
    try {
      if (!window.__wasbNativeConsoleLog__) {
        window.__wasbNativeConsoleLog__ = console.log.bind(console);
      }
      window.__wasbNativeConsoleLog__("[WASB]", entry.message);
    } catch (_) {}
    if (typeof window.__wasbConsoleRenderEntry__ === "function") {
      try {
        window.__wasbConsoleRenderEntry__(entry);
      } catch (_) {}
    }
  };

  window.__wasbInstallNativeConsoleBridge__ = function () {
    if (window.__wasbNativeConsoleBridgeInstalled__) return;
    window.__wasbNativeConsoleBridgeInstalled__ = true;

    if (!window.__wasbNativeConsoleLog__) {
      window.__wasbNativeConsoleLog__ = console.log.bind(console);
    }

    function formatArgs(args) {
      return (args || []).map(function (arg) {
        if (arg === undefined) return "undefined";
        if (arg === null) return "null";
        if (typeof arg === "string") return arg;
        if (arg instanceof Error) {
          return arg.stack || arg.message || String(arg);
        }
        try {
          var text = JSON.stringify(arg);
          if (text && text.length > 280) return text.slice(0, 277) + "…";
          return text;
        } catch (_) {
          return String(arg);
        }
      }).join(" ");
    }

    ["log", "info", "debug", "warn", "error"].forEach(function (level) {
      var key = "__wasbNativeConsole" + level + "__";
      var native = window[key];
      if (!native) {
        if (level === "log" && window.__wasbNativeConsoleLog__) {
          native = window.__wasbNativeConsoleLog__;
        } else if (typeof console[level] === "function") {
          native = console[level].bind(console);
        }
        window[key] = native;
      }
      if (typeof native !== "function") return;
      console[level] = function () {
        var args = Array.prototype.slice.call(arguments);
        var formatted = formatArgs(args);
        if (
          formatted.indexOf("[WASB]") !== 0 &&
          formatted.indexOf("[TOAST]") !== 0 &&
          typeof window.__wasbPushConsoleLog__ === "function"
        ) {
          var type =
            level === "error"
              ? "error"
              : level === "warn"
                ? "warning"
                : "info";
          window.__wasbPushConsoleLog__("· " + formatted, type, {
            channel: "dev",
          });
        }
        return native.apply(console, args);
      };
    });
  };
  window.__wasbInstallNativeConsoleBridge__();

  if (typeof window.logToConsole !== "function") {
    window.logToConsole = window.__wasbPushConsoleLog__;
  }

  if (typeof window.showToast !== "function") {
    window.showToast = function (message) {
      console.log("[TOAST]", message);
    };
  }

  if (typeof window.STATE !== "object" || !window.STATE) {
    window.STATE = {};
  }
</script>

<script>
  // Js.Vacations — vacation module inside main WASB sidebar (resultContent).

  function renderVacationReminderResult_(vacations, message) {
    var html =
      '<div class="result-item">' +
      '<div class="result-label">Нагадування</div>' +
      '<div class="result-value">' +
      escapeHtml(message || "Перевірку виконано") +
      "</div>";
    if (
      typeof hasVacationBlocks === "function" &&
      hasVacationBlocks(vacations)
    ) {
      html += renderVacationAlerts(vacations);
    }
    html += "</div>";
    return html;
  }

  function formatDateUa(value) {
    if (typeof formatDateForDisplay === "function") {
      return formatDateForDisplay(value);
    }
    if (!value) return "";
    if (typeof value === "string") {
      var text = value.trim();
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) {
        return text;
      }
      if (/\d{4}-\d{2}-\d{2}/.test(text)) {
        return text.replace(
          /\b(\d{4})-(\d{2})-(\d{2})\b/g,
          function (_, year, month, day) {
            return day + "." + month + "." + year;
          },
        );
      }
    }
    var date = value instanceof Date ? value : new Date(value);
    if (!Number.isNaN(date.getTime())) {
      var dayPart = String(date.getDate()).padStart(2, "0");
      var monthPart = String(date.getMonth() + 1).padStart(2, "0");
      return dayPart + "." + monthPart + "." + date.getFullYear();
    }
    return String(value);
  }

  const VACATION_RULE_HUMAN_LABELS = {
    GAP_TOO_SHORT: "Замалий інтервал між відпустками",
    PERSON_GAP: "Замалий інтервал між відпустками",
    PERSON_OVERLAP: "Відпустки однієї людини перетинаються",
    START_TOO_CLOSE: "Дати початку занадто близько",
    START_GAP: "Дати початку занадто близько",
    MIN_PERSON_YEAR: "Немає відпустки у році",
    YEAR_LIMIT: "Забагато відпусток у році",
    MAX_PERSON_YEAR: "Забагато відпусток у році",
    MAX_CONCURRENT: "Забагато людей одночасно у відпустці",
    INVALID_DATE: "Некоректна дата",
    INVALID_DURATION: "Некоректна тривалість",
    PERSONNEL_VACATION_WITHOUT_PLAN: "Статус особового складу не підтверджений планом",
    MONTHLY_VACATION_WITHOUT_PLAN:
      "Код у місячному графіку не підтверджений планом",
    PLAN_WITHOUT_MONTHLY_VACATION: "План не відображений у місячному графіку",
    HIGH_LOAD_PERIOD: "Період на межі допустимого навантаження",
    MONTH_BALANCE: "Перекіс стартів відпусток у місяці",
    RIGHT_PANEL_LEGACY_DATA: "Дані у правій таблиці K:Q (не джерело істини)",
  };

  function normalizeVacationRuleType_(type) {
    var aliases = {
      GAP_TOO_SHORT: "PERSON_GAP",
      START_TOO_CLOSE: "START_GAP",
      YEAR_LIMIT: "MAX_PERSON_YEAR",
    };
    return aliases[type] || type;
  }

  function humanVacationRuleLabel_(type) {
    var key = String(type || "").trim();
    return (
      VACATION_RULE_HUMAN_LABELS[key] ||
      VACATION_RULE_HUMAN_LABELS[normalizeVacationRuleType_(key)] ||
      key ||
      "Проблема"
    );
  }

  function buildVacationProblemSuggestions_(problem) {
    var type = normalizeVacationRuleType_(
      String((problem && (problem.type || problem.rule)) || "").trim(),
    );
    if (type === "INVALID_DATE") {
      return [
        "Перевірити дату початку та дату завершення у джерелі плану відпусток.",
        "Перезаписати відпустку через модуль 🏖️ Відпустки, щоб формули перерахували дату.",
      ];
    }
    if (type === "INVALID_DURATION") {
      return [
        "Зменшити або виправити кількість днів відпустки.",
        "Перевірити travel-дні: вони не повинні ламати основну тривалість.",
      ];
    }
    if (type === "MAX_PERSON_YEAR") {
      return [
        "Скасувати або перенести одну з відпусток цієї людини на інший рік.",
        "Перевірити, чи не дублюється запис у джерелі плану відпусток.",
      ];
    }
    if (type === "MIN_PERSON_YEAR") {
      return [
        "Додати першу відпустку для цієї людини у плані відпусток.",
        "Скористатися підбором дат, щоб знайти безпечний період без нових конфліктів.",
      ];
    }
    if (type === "PERSON_OVERLAP") {
      return [
        "Перенести одну з відпусток цієї людини.",
        "Якщо це дублікат — скасувати зайвий запис.",
      ];
    }
    if (type === "PERSON_GAP") {
      return [
        "Збільшити інтервал між відпустками цієї людини.",
        "Скористатися підбором дат для найближчого допустимого варіанту.",
      ];
    }
    if (type === "START_GAP") {
      return [
        "Рознести дати старту між цими людьми.",
        "Перенести одну відпустку на декілька днів раніше або пізніше.",
      ];
    }
    if (type === "MAX_CONCURRENT") {
      return [
        "Перенести одну з відпусток з цього періоду.",
        "Вибрати людину з найменш критичним графіком і підібрати нову дату.",
        "Скористатися вкладкою «Підібрати» для проблемного військовослужбовця.",
      ];
    }
    if (type === "HIGH_LOAD_PERIOD" || type === "MONTH_BALANCE") {
      return [
        "Перевірити навантаження підрозділу у вибраному періоді.",
        "За потреби підібрати менш завантажену дату.",
      ];
    }
    if (type === "PERSONNEL_VACATION_WITHOUT_PLAN") {
      return [
        "Перевірити поточний статус людини в особовому складі.",
        "Якщо людина у відпустці — додати або виправити відповідний запис у плані відпусток.",
      ];
    }
    if (type === "MONTHLY_VACATION_WITHOUT_PLAN") {
      return [
        "Перевірити код «Відпус» у місячному графіку.",
        "Якщо відпустка фактична — додати або виправити відповідний запис у плані відпусток.",
      ];
    }
    if (type === "PLAN_WITHOUT_MONTHLY_VACATION") {
      return [
        "Перевірити дати активної відпустки у плані відпусток.",
        "Якщо план уже застосований — встановити код «Відпус» у місячному графіку.",
      ];
    }
    if (type === "RIGHT_PANEL_LEGACY_DATA") {
      return [
        "Знайдено записи у K:Q. Натисніть, щоб перенести їх в основне джерело A:I.",
      ];
    }
    return [
      "Перевірити запис у джерелі плану відпусток.",
      "Спробувати перенести відпустку через модуль 🏖️ Відпустки.",
    ];
  }

  function renderVacationFixSuggestions_(problem) {
    var suggestions = Array.isArray(problem && problem.fixSuggestions)
      ? problem.fixSuggestions
      : [];
    if (!suggestions.length) {
      return buildVacationProblemSuggestions_(problem)
        .map(function (text) {
          return "<li>" + escapeHtml(text) + "</li>";
        })
        .join("");
    }
    return suggestions
      .map(function (item, suggestionIndex) {
        var effectHtml = (item.effect || [])
          .map(function (effect) {
            return "<li>" + escapeHtml(effect) + "</li>";
          })
          .join("");
        var risksHtml = (item.risks || [])
          .map(function (risk) {
            return "<li>" + escapeHtml(risk) + "</li>";
          })
          .join("");
        var applyAction = item.canAutoApply
          ? '<div class="result-screen-actions">' +
            '<button class="btn btn-secondary vacations-btn-sm" type="button" onclick="VacationModule.applyFixSuggestion(' +
            Number((problem && problem.__index) != null ? problem.__index : 0) +
            ", " +
            Number(suggestionIndex) +
            ')">Застосувати</button>' +
            "</div>"
          : item.autoApplyReason
            ? '<div class="vacations-muted">' +
              escapeHtml(item.autoApplyReason) +
              "</div>"
            : "";
        return (
          '<li class="vacation-fix-suggestion">' +
          "<strong>" +
          escapeHtml(item.title || item.personName || "Пропозиція") +
          "</strong>" +
          '<div class="vacations-muted">Було: ' +
          escapeHtml((item.oldStart || "—") + " – " + (item.oldEnd || "—")) +
          "</div>" +
          '<div class="vacations-muted">Стало: ' +
          escapeHtml((item.newStart || "—") + " – " + (item.newEnd || "—")) +
          "</div>" +
          (effectHtml
            ? '<div class="vacation-problem-card__subtitle">Ефект:</div><ul>' +
              effectHtml +
              "</ul>"
            : "") +
          (risksHtml
            ? '<div class="vacation-problem-card__subtitle">Ризик:</div><ul>' +
              risksHtml +
              "</ul>"
            : "") +
          applyAction +
          "</li>"
        );
      })
      .join("");
  }

  function renderVacationBulkPlanPreview_(plan) {
    if (!plan || !plan.success) {
      return '<div class="vacations-empty">План не побудовано.</div>';
    }
    var moves = Array.isArray(plan.moves) ? plan.moves : [];
    var remaining = Array.isArray(plan.remainingProblems)
      ? plan.remainingProblems
      : [];
    var html =
      '<div class="vacations-card vacations-bulk-plan">' +
      '<div class="vacations-card__head"><strong>Попередній перегляд пакетного рішення</strong></div>' +
      '<div class="vacation-problem-card__person">Знайдено проблем: ' +
      escapeHtml(plan.totalProblems || 0) +
      "</div>" +
      '<div class="vacations-muted">Може бути вирішено: ' +
      escapeHtml(plan.resolvedProblems || 0) +
      "</div>" +
      '<div class="vacations-muted">Залишиться: ' +
      escapeHtml(plan.unresolvedProblems || 0) +
      "</div>";
    if (Array.isArray(plan.warnings) && plan.warnings.length) {
      html +=
        '<div class="vacations-problem-summary-warning">' +
        escapeHtml(plan.warnings.join(" ")) +
        "</div>";
    }
    if (!moves.length) {
      html +=
        '<div class="vacations-muted vacations-problem-summary-line">Автоматичних перенесень не знайдено.</div>';
    } else {
      html += '<ul class="vacations-bulk-plan__moves">';
      moves.forEach(function (move) {
        html +=
          "<li><strong>" +
          escapeHtml(move.fml || "—") +
          "</strong> (" +
          escapeHtml(move.type || "—") +
          ")<br>" +
          escapeHtml(move.oldStart || move.oldStartIso || "—") +
          " → " +
          escapeHtml(move.newStart || move.newStartIso || "—") +
          "<br><span class=\"vacations-muted\">Виправляє: " +
          escapeHtml((move.fixes || []).join(", ") || "—") +
          "</span>";
        if (move.risks && move.risks.length) {
          html +=
            '<br><span class="vacations-muted">Ризики: ' +
            escapeHtml(move.risks.join("; ")) +
            "</span>";
        }
        html += "</li>";
      });
      html += "</ul>";
    }
    if (remaining.length) {
      html +=
        '<div class="vacation-problem-card__subtitle">Не вдалося автоматично:</div><ul class="vacations-problem-summary-list">';
      remaining.slice(0, 8).forEach(function (item) {
        html +=
          "<li>" +
          escapeHtml(item.type || "—") +
          ": " +
          escapeHtml(item.fml || "—") +
          " — " +
          escapeHtml(item.description || "") +
          "</li>";
      });
      html += "</ul>";
    }
    html += "</div>";
    return html;
  }

  function renderVacationProblemsSummary_(checks, plan) {
    var list = Array.isArray(checks) ? checks : [];
    var errors = 0;
    var warnings = 0;
    list.forEach(function (item) {
      var severity = String((item && item.severity) || "ERROR").toUpperCase();
      if (severity === "WARNING" || severity === "WARN") warnings++;
      else errors++;
    });
    var html =
      '<div class="vacations-card vacations-problems-summary">' +
      '<div class="vacations-card__head"><strong>Підсумок проблем</strong></div>' +
      '<div class="vacation-problem-card__person">Знайдено: ' +
      escapeHtml(list.length) +
      "</div>" +
      '<div class="vacations-muted">Критичних: ' +
      escapeHtml(errors) +
      "</div>" +
      '<div class="vacations-muted">Попереджень: ' +
      escapeHtml(warnings) +
      "</div>";
    if (plan && plan.success) {
      html +=
        '<div class="vacations-muted vacations-problem-summary-line">У плані перенесень: ' +
        escapeHtml((plan.moves || []).length) +
        ", вирішується проблем: " +
        escapeHtml(plan.resolvedProblems || 0) +
        "</div>";
    }
    html += "</div>";
    return html;
  }

  function formatVacationShortDate_(value) {
    var text = String(value || "").trim();
    var match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (match) return match[3] + "." + match[2];
    return formatDateUa(text);
  }

  function getVacationLoadLevelLabel_(loadLevel) {
    var level = String(loadLevel || "normal");
    if (level === "max") return "граничне навантаження";
    if (level === "warning") return "попередження";
    if (level === "error") return "помилка";
    return "норма";
  }

  function buildVacationDayTooltip_(day) {
    if (!day) return "";
    var lines = [];
    var dateText = formatDateUa(day.isoDate || day.dateIso || "");
    var count = Number(day.vacationsCount || 0);
    var problems = Array.isArray(day.problemsPreview)
      ? day.problemsPreview
      : Array.isArray(day.problems)
        ? day.problems
        : [];
    var problemsCount =
      day.problemsCount != null ? Number(day.problemsCount) : problems.length;
    var loadLevel = String(day.loadLevel || "normal");

    lines.push(dateText);
    lines.push("У відпустці: " + count);
    lines.push("Проблем: " + problemsCount);
    lines.push("Статус: " + getVacationLoadLevelLabel_(loadLevel));

    if (loadLevel === "warning" && problems.length) {
      lines.push(
        problems[0].message ||
          "4 особи одночасно допускаються тільки до 3 днів",
      );
    } else if (loadLevel === "error" && problems.length) {
      lines.push(
        problems[0].message ||
          "Перевищено допустиму кількість людей у відпустці",
      );
    }

    if (problems.length) {
      lines.push("");
      lines.push("Проблеми:");
      problems.slice(0, 3).forEach(function (problem) {
        lines.push(
          "- " + String(problem.message || problem.title || problem.type || "—"),
        );
      });
    }

    var people = Array.isArray(day.peoplePreview)
      ? day.peoplePreview
      : Array.isArray(day.vacations)
        ? day.vacations
        : [];
    if (people.length) {
      lines.push("");
      lines.push("Люди:");
      people.slice(0, 5).forEach(function (person, index) {
        var name =
          person.name ||
          person.fml ||
          person.fullName ||
          person.callsign ||
          person.shortLabel ||
          "Без імені";
        var start =
          person.startText ||
          formatVacationShortDate_(person.startIso || person.startDate);
        var end =
          person.endText ||
          formatVacationShortDate_(person.endIso || person.endDate);
        if (start && end) {
          lines.push(String(index + 1) + ". " + name + " — " + start + "–" + end);
        } else {
          lines.push(String(index + 1) + ". " + name);
        }
      });
      if (people.length > 5) {
        lines.push("...ще " + (people.length - 5));
      }
    }

    lines.push("");
    if (problemsCount > 0) {
      lines.push("Натисніть, щоб переглянути варіанти переносу");
    } else {
      lines.push("Натисніть, щоб переглянути деталі");
    }
    return lines.join("\n");
  }

  function escapeTooltipAttr_(value) {
    return escapeHtml(String(value == null ? "" : value)).replace(/\n/g, "&#10;");
  }

  function renderVacationMonthCalendar_(calendar) {
    if (!calendar || !calendar.success) {
      return '<div class="vacations-empty">Календар недоступний.</div>';
    }
    var weeks = Array.isArray(calendar.weeks) ? calendar.weeks : [];
    var weekdays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"];
    var html =
      '<div class="vacations-mini-calendar">' +
      '<div class="vacations-mini-calendar__header">' +
      escapeHtml(calendar.monthLabel || "") +
      "</div>" +
      '<div class="vacations-mini-calendar__grid">';
    weekdays.forEach(function (label) {
      html +=
        '<div class="vacations-mini-calendar__weekday">' +
        escapeHtml(label) +
        "</div>";
    });
    weeks.forEach(function (week) {
      week.forEach(function (day) {
        var classes = ["vacations-mini-calendar__day"];
        if (!day.inMonth) classes.push("vacations-mini-calendar__day--outside");
        if (day.isWeekend) classes.push("vacations-mini-calendar__day--weekend");
        var loadLevel = String(day.loadLevel || "");
        if (loadLevel === "error" || day.overload) {
          classes.push("vacations-mini-calendar__day--overload");
        } else if (loadLevel === "warning") {
          classes.push("vacations-mini-calendar__day--warning");
        } else if (loadLevel === "max" || day.full) {
          classes.push("vacations-mini-calendar__day--max");
        }
        var count = Number(day.vacationsCount) || 0;
        var countLabel = String(count);
        if (loadLevel === "warning") countLabel = "⚠ " + count;
        else if (loadLevel === "error" || day.overload) countLabel = "❌ " + count;
        var tooltip = buildVacationDayTooltip_(day);
        html +=
          '<button type="button" class="' +
          classes.join(" ") +
          '" title="' +
          escapeTooltipAttr_(tooltip) +
          '" onclick="VacationModule.showCalendarDayDetails(\'' +
          String(day.dateIso || day.isoDate || "")
            .replace(/\\/g, "\\\\")
            .replace(/'/g, "\\'") +
          "')\">" +
          '<div class="vacations-mini-calendar__day-card">' +
          '<div class="vacations-mini-calendar__day-number">' +
          escapeHtml(day.day) +
          "</div>" +
          '<div class="vacations-mini-calendar__day-divider"></div>' +
          '<div class="vacations-mini-calendar__count">' +
          escapeHtml(countLabel) +
          "</div>" +
          "</div>" +
          "</button>";
      });
    });
    html += "</div>";
    if (calendar.summary) {
      html +=
        '<div class="vacations-muted vacations-problem-summary-line">' +
        "Проблемних дат: " +
        escapeHtml(calendar.summary.problemDays || 0) +
        "<br>Навантажених днів: " +
        escapeHtml(calendar.summary.loadedDays || 0) +
        "</div>";
    }
    html += "</div>";
    return html;
  }

  function renderVacationProblems_(checks) {
    var list = Array.isArray(checks) ? checks : [];
    if (!list.length) {
      return '<div class="vacations-card vacations-empty">Проблемних питань не знайдено.</div>';
    }
    return list
      .map(function (item, index) {
        var type = normalizeVacationRuleType_(
          String((item && (item.type || item.rule)) || "").trim(),
        );
        var label = humanVacationRuleLabel_(type);
        var problem = Object.assign({}, item, { __index: index });
        var suggestions = renderVacationFixSuggestions_(problem);
        var canFindNewDate =
          ["PERSON_GAP", "START_GAP", "MAX_CONCURRENT"].indexOf(type) !== -1 &&
          !(Array.isArray(item.fixSuggestions) && item.fixSuggestions.length);
        var findAction = canFindNewDate
          ? '<div class="result-screen-actions">' +
            '<button class="btn btn-secondary vacations-btn-sm" type="button" onclick="VacationModule.openFindFromProblem(' +
            Number(index) +
            ')">Підібрати нову дату</button>' +
            "</div>"
          : "";
        var migrationAction =
          type === "RIGHT_PANEL_LEGACY_DATA"
            ? '<div class="vacations-muted">Знайдено записи у K:Q. Натисніть, щоб перенести їх в основне джерело A:I.</div>' +
              '<div class="result-screen-actions">' +
              '<button class="btn btn-primary vacations-btn-sm" type="button" onclick="VacationModule.applyRightPanelMigration()">Міграція K:Q → A:I</button>' +
              "</div>"
            : "";
        var monthLabel =
          type === "MONTH_BALANCE" &&
          String(item.date || "").match(/^\d{4}-\d{1,2}$/)
            ? '<div class="vacations-muted">Місяць: ' +
              escapeHtml(formatMonthLabelUa_(item.date)) +
              "</div>"
            : "";
        return (
          '<div class="vacations-card vacation-problem-card">' +
          '<div class="vacations-card__head vacation-card-header">' +
          '<strong class="vacations-card__title vacation-card-title">' +
          escapeHtml(label) +
          '</strong><span class="vacations-badge vacation-card-badge">' +
          escapeHtml((item && item.severity) || "ERROR") +
          "</span></div>" +
          '<div class="vacation-problem-card__person">' +
          escapeHtml((item && item.fml) || "—") +
          "</div>" +
          monthLabel +
          '<div class="vacations-muted">Дата: ' +
          escapeHtml(formatDateUa((item && item.date) || "—")) +
          "</div>" +
          '<div class="vacation-problem-card__description">' +
          escapeHtml((item && (item.description || item.details)) || "") +
          "</div>" +
          '<div class="vacation-problem-card__subtitle">Варіанти вирішення:</div>' +
          "<ul>" +
          suggestions +
          "</ul>" +
          migrationAction +
          findAction +
          "</div>"
        );
      })
      .join("");
  }

  function formatMonthLabelUa_(yearMonth) {
    var months = [
      "січень",
      "лютий",
      "березень",
      "квітень",
      "травень",
      "червень",
      "липень",
      "серпень",
      "вересень",
      "жовтень",
      "листопад",
      "грудень",
    ];
    var match = String(yearMonth || "").match(/^(\d{4})-(\d{1,2})$/);
    if (!match) return String(yearMonth || "");
    return months[Number(match[2]) - 1] + " " + match[1];

    statusHtml() {

    vacationListHtml() {

            '<div class="vacations-card__head vacation-card-header">' +
            '<strong class="vacations-card__title vacation-card-title">' +

      return Number(this.state.scheduleYear) || new Date().getFullYear();

            this.esc(s.stats.activePeople || 0) +
            "</strong><span>людей</span></div></div>" +
            this.scheduleSummaryHtml() +
            this.monthCalendarHtml() +
            '<div class="result-screen-actions">' +
            '<button class="btn btn-primary" type="button" onclick="VacationModule.openUpdatedSchedule()">📅 Оновити і відкрити графік</button>' +
            '<button class="btn btn-secondary" type="button" onclick="VacationModule.checkReminders()">🔔 Перевірити нагадування</button>' +
            '<button class="btn btn-secondary vacations-btn-sm" type="button" title="Оновлює дані бокової панелі з таблиці. Не перебудовує графік." onclick="VacationModule.loadState()">↻ Оновити дані</button>' +
            "</div>" +
            '<div id="vacationReminderResult">' +
            (s.remindersHtml || "") +
            "</div></div>"
          );
      }
    },

    render() {
      setHtml(
        "resultContent",
        '<div class="vacations-module vacation-module" id="vacationsModuleRoot">' +
          this.tabsHtml() +
          '<div class="vacations-panel">' +
          this.panelHtml() +
          this.statusHtml() +
          "</div></div>",
      );
    },

    setStatus(message, type) {
      this.state.statusMessage = message || "";
      this.state.statusType = type || "info";
    },

    read(id) {
      var el = document.getElementById(id);
      return el ? el.value : "";
    },

    todayInputDate() {
      var now = new Date();
      return (
        now.getFullYear() +
        "-" +
        String(now.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(now.getDate()).padStart(2, "0")
      );
    },

    problemFindDraft(problem) {
      var item = problem || {};
      var fml = String(item.primaryFml || item.fml || "").trim();
      if (/[\/,]/.test(fml) && !item.primaryFml) fml = "";
      var date = String(item.startDate || item.date || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = this.todayInputDate();
      var vacationNumber = Number(item.vacationNumber) || 0;
      var days = Number(item.days) || 0;
      return {
        fml: fml,
        vacationNumber: vacationNumber || 1,
        startDate: date,
        days: days || 15,
        searchWindow: 30,
        complete: !!(fml && vacationNumber && days),
      };
    },

    show() {
      showStandardResult("🏖️ Відпустки");
      setText("resultTitle", "🏖️ Відпустки");
      this.state.activeTab = "overview";
      this.setStatus("Завантаження…", "info");
      this.render();
      var self = this;
      this.loadState().then(function () {
        return self.loadMonthCalendar();
      });
    },

    async loadState() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "getVacationSidebarState",
          [],
          "VacationModule.loadState",
        );
        this.state.personnel = result.personnel || [];
        this.state.vacations = result.vacations || [];
        this.state.stats = result.stats || { total: 0, activePeople: 0 };
        this.state.scheduleYear =
          Number(result.scheduleYear) || new Date().getFullYear();
        this.state.scheduleYearOptions = Array.isArray(
          result.scheduleYearOptions,
        )
          ? result.scheduleYearOptions
          : [];
        this.state.problemSummary = result.problemSummary || null;
        this.state.rightPanelMigration = result.rightPanelMigration || null;
        this.setStatus("", "info");
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    openTab(tab) {
      this.state.activeTab = tab;
      this.setStatus("", "info");
      this.render();
      if (tab === "overview" && !this.state.monthCalendar) {
        this.loadMonthCalendar();
      }
      if (tab === "check" && !this.state.problemsLoaded) {
        this.loadProblems();
      }
    },

    openFindFromProblem(index) {
      var problem = this.state.checks[Number(index)];
      if (!problem) return;
      var draft = this.problemFindDraft(problem);
      this.state.findDraft = draft;
      this.state.options = [];
      this.state.activeTab = "find";
      this.setStatus(
        draft.complete
          ? "Поля підбору заповнено з проблемного питання."
          : "Не вдалося однозначно визначити відпустку. Перевірте поля підбору вручну.",
        draft.complete ? "info" : "warning",
      );
      this.render();
    },

    async applyRightPanelMigration() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "applyRightPanelMigrationFromSidebar",
          [],
          "VacationModule.applyRightPanelMigration",
        );
        var migration = (result && result.migration) || result || {};
        var message =
          migration.message ||
          (migration.migrated > 0
            ? "Перенесено записів: " + migration.migrated
            : "Міграцію правої таблиці завершено");
        showToast("✓ " + message);
        this.setStatus(message, migration.migrated > 0 ? "success" : "info");
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        }
        if (result.rightPanelMigration) {
          this.state.rightPanelMigration = result.rightPanelMigration;
        }
        if (result.vacations) {
          this.state.vacations = result.vacations;
        }
        if (result.stats) {
          this.state.stats = result.stats;
        }
        await this.loadState();
        if (this.state.problemsLoaded) {
          await this.loadProblems();
        } else {
          this.render();
        }
        logToConsole("✓ " + message, "success");
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async applyFixSuggestion(problemIndex, suggestionIndex) {
      var problem = this.state.checks[Number(problemIndex)];
      var suggestion =
        problem &&
        Array.isArray(problem.fixSuggestions) &&
        problem.fixSuggestions[Number(suggestionIndex)];
      if (!suggestion) {
        this.setStatus("Пропозицію не знайдено", "error");
        return;
      }
      if (!suggestion.canAutoApply) {
        this.setStatus(
          suggestion.autoApplyReason ||
            "Цю пропозицію не можна застосувати автоматично",
          "warning",
        );
        return;
      }
      showLoading();
      try {
        await runServerMethod_(
          "applyVacationSuggestionFromSidebar",
          [
            Object.assign({}, suggestion, {
              fml: suggestion.personName || suggestion.fml,
              issueId: problem.issueId || "",
            }),
          ],
          "VacationModule.applyFixSuggestion",
        );
        showToast("✓ Пропозицію застосовано");
        await this.loadProblems();
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async checkReminders() {
      showLoading();
      try {
        var result = await ActionDispatcher.run(
          "checkVacationsAndBirthdays",
          function () {
            return Stage7Api.checkVacationsAndBirthdays({
              date: _todayStr_(),
              recipientRole: getSelectedCommanderRecipient_(),
            });
          },
        );
        if (!result || !result.success) {
          throw new Error(result?.error || "Не вдалося перевірити нагадування");
        }
        this.state.remindersHtml = renderVacationReminderResult_(
          result.vacations || {},
          result.message || "",
        );
        this.setStatus("🏖️ Нагадування про відпустки перевірено", "success");
        logToConsole("🏖️ Нагадування про відпустки перевірено", "success");
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async openUpdatedSchedule() {
      console.log("[VacationModule.openUpdatedSchedule] clicked");
      showLoading();
      showToast("Оновлюю графік відпусток...");
      try {
        var year = this.getScheduleYear_();
        this.state.scheduleYear = year;
        var result = await runServerMethod_(
          "openUpdatedVacationScheduleFromSidebar",
          [{ year: year }],
          "VacationModule.openUpdatedSchedule",
        );
        logToConsole(
          "[VacationModule.openUpdatedSchedule] success " +
            JSON.stringify(result || {}),
          "success",
        );
        showToast(
          result && result.message
            ? result.message
            : "Графік відпусток оновлено і відкрито",
        );
        if (result && result.rebuild && result.rebuild.problemSummary) {
          this.state.problemSummary = result.rebuild.problemSummary;
        }
        if (result && result.year) {
          this.state.scheduleYear = Number(result.year);
        }
        await this.loadState();
      } catch (error) {
        console.error("[VacationModule.openUpdatedSchedule] failed", error);
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async submitAdd() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "addVacationFromSidebar",
          [
            {
              fml: this.read("vacAddPerson"),
              type: this.read("vacAddType"),
              startDate: this.read("vacAddStart"),
              days: Number(this.read("vacAddDays")),
            },
          ],
          "VacationModule.submitAdd",
        );
        showToast(
          result.warnings && result.warnings.length
            ? "⚠ Відпустку додано з попередженнями"
            : "✓ Відпустку додано",
        );
        this.state.activeTab = "overview";
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async submitFind() {
      showLoading();
      try {
        this.state.options = await runServerMethod_(
          "findVacationSidebarOptions",
          [
            {
              fml: this.read("vacFindPerson"),
              vacationNumber: Number(this.read("vacFindNumber")),
              desiredStart: this.read("vacFindStart"),
              durationDays: Number(this.read("vacFindDays")),
              searchWindow: Number(this.read("vacFindWindow")),
            },
          ],
          "VacationModule.submitFind",
        );
        this.setStatus("Підбір завершено.", "success");
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async applyOption(index) {
      var item = this.state.options[index];
      if (!item) return;
      showLoading();
      try {
        var result = await runServerMethod_(
          "applyVacationOptionFromSidebar",
          [item],
          "VacationModule.applyOption",
        );
        showToast(
          result.warnings && result.warnings.length
            ? "⚠ Варіант застосовано з попередженнями"
            : "✓ Варіант застосовано",
        );
        this.state.activeTab = "overview";
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    prepareMove(index) {
      var vacation = this.state.vacations[index];
      if (!vacation) return;
      this.state.moveIndex = String(index);
      this.state.activeTab = "plan";
      this.render();
      var moveStart = document.getElementById("vacMoveStart");
      var moveDays = document.getElementById("vacMoveDays");
      if (moveStart) moveStart.value = vacation.startDate;
      if (moveDays) moveDays.value = String(vacation.days);
    },

    async submitMove() {
      var vacation = this.state.vacations[Number(this.read("vacMoveVacation"))];
      if (!vacation) throw new Error("Оберіть відпустку");
      showLoading();
      try {
        var result = await runServerMethod_(
          "moveVacationFromSidebar",
          [
            {
              requestId: vacation.requestId,
              personKey: vacation.personKey,
              fml: vacation.fml,
              vacationNumber: vacation.vacationNumber,
              type: vacation.type,
              sourceRow: vacation.sourceRow,
              sourceStartColumn: vacation.sourceStartColumn,
              startDate: this.read("vacMoveStart"),
              days: Number(this.read("vacMoveDays")),
            },
          ],
          "VacationModule.submitMove",
        );
        showToast(
          result.warnings && result.warnings.length
            ? "⚠ Відпустку перенесено з попередженнями"
            : "✓ Відпустку перенесено",
        );
        this.state.moveIndex = "";
        this.state.activeTab = "plan";
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async loadProblems() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "checkVacationRulesFromSidebar",
          [],
          "VacationModule.loadProblems",
        );
        this.state.checks = result.checks || [];
        this.state.problemsLoaded = true;
        this.state.bulkFixPlan = null;
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        } else if (result.errorCount != null) {
          this.state.problemSummary = {
            errorCount: result.errorCount,
            warningCount: result.warningCount || 0,
            problemCount: result.problemCount || result.errorCount,
            scheduleRows: result.scheduleRows || this.state.stats.total,
            items: [],
            summaryLine: "",
          };
        }
        this.setStatus(
          result.problemCount || result.errorCount
            ? "Проблемних питань: " + (result.problemCount || result.errorCount)
            : "Проблемних питань не знайдено.",
          result.problemCount || result.errorCount ? "warning" : "success",
        );
        this.render();
        logToConsole(
          this.state.checks.length
            ? "⚠ Проблемних питань: " + this.state.checks.length
            : "✓ Проблемних питань не знайдено",
          this.state.checks.length ? "warning" : "success",
        );
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async checkAllRules() {
      return this.loadProblems();
    },

    async buildBulkFixPlan() {
      if (!this.state.problemsLoaded) {
        await this.loadProblems();
      }
      showLoading();
      try {
        var plan = await runServerMethod_(
          "buildVacationBulkFixPlanFromSidebar",
          [{}],
          "VacationModule.buildBulkFixPlan",
        );
        this.state.bulkFixPlan = plan || null;
        this.setStatus(
          plan && plan.moves && plan.moves.length
            ? "Пакетний план: " +
                plan.moves.length +
                " перенесень, вирішується " +
                (plan.resolvedProblems || 0) +
                " проблем."
            : plan && plan.warnings && plan.warnings.length
              ? plan.warnings[0]
              : "Автоматичних перенесень не знайдено.",
          plan && plan.moves && plan.moves.length ? "info" : "warning",
        );
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async applyBulkFixPlan() {
      var plan = this.state.bulkFixPlan;
      if (!plan || !plan.success || !Array.isArray(plan.moves) || !plan.moves.length) {
        this.setStatus("Спочатку підберіть пакетне рішення.", "warning");
        return;
      }
      if (
        !window.confirm(
          "Застосувати " + plan.moves.length + " перенесень відпусток?",
        )
      ) {
        return;
      }
      showLoading();
      try {
        var result = await runServerMethod_(
          "applyVacationBulkFixPlanFromSidebar",
          [{ plan: plan }],
          "VacationModule.applyBulkFixPlan",
        );
        if (!result || result.success !== true) {
          throw new Error(
            (result && result.message) ||
              "Не вдалося застосувати пакетне рішення",
          );
        }
        this.state.bulkFixPlan = null;
        showToast("Пакетне рішення застосовано. Оновіть графік відпусток.");
        this.setStatus(
          "Пакетне рішення застосовано. Залишилось проблем: " +
            (result.problemCount || 0),
          "success",
        );
        await this.loadProblems();
        await this.loadState();
        await this.loadMonthCalendar();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    getCalendarYearMonth_() {
      var year = Number(this.read("vacCalendarYear"));
      var month = Number(this.read("vacCalendarMonth"));
      if (!(year >= 1900 && year <= 9999)) {
        year = Number(this.state.calendarYear) || new Date().getFullYear();
      }
      if (!(month >= 1 && month <= 12)) {
        month = Number(this.state.calendarMonth) || new Date().getMonth() + 1;
      }
      this.state.calendarYear = year;
      this.state.calendarMonth = month;
      return { year: year, month: month };
    },

    async loadMonthCalendar(preferredYearMonth) {
      var ym;
      if (
        preferredYearMonth &&
        Number(preferredYearMonth.year) >= 1900 &&
        Number(preferredYearMonth.month) >= 1 &&
        Number(preferredYearMonth.month) <= 12
      ) {
        ym = {
          year: Number(preferredYearMonth.year),
          month: Number(preferredYearMonth.month),
        };
        this.state.calendarYear = ym.year;
        this.state.calendarMonth = ym.month;
      } else {
        ym = this.getCalendarYearMonth_();
      }
      showLoading();
      try {
        var calendar = await runServerMethod_(
          "getVacationMonthCalendarFromSidebar",
          [{ year: ym.year, month: ym.month }],
          "VacationModule.loadMonthCalendar",
        );
        this.renderMonthCalendar(calendar);
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    renderMonthCalendar(calendar) {
      this.state.monthCalendar = calendar || null;
      this.state.calendarDayDetails = "";
      if (calendar && calendar.success) {
        this.state.calendarYear = Number(calendar.year) || this.state.calendarYear;
        this.state.calendarMonth =
          Number(calendar.month) || this.state.calendarMonth;
      }
      this.render();
    },

    shiftMonthCalendar(delta) {
      var year = Number(this.state.calendarYear) || new Date().getFullYear();
      var month = Number(this.state.calendarMonth) || new Date().getMonth() + 1;
      month += Number(delta) || 0;
      while (month < 1) {
        month += 12;
        year -= 1;
      }
      while (month > 12) {
        month -= 12;
        year += 1;
      }
      this.loadMonthCalendar({ year: year, month: month });
    },

    formatCalendarDayDetailsHtml_(details) {
      if (!details || !details.success) {
        return '<div class="vacations-empty">Деталі недоступні.</div>';
      }
      var lines = [
        "<strong>" + this.esc(details.dateLabel || details.dateIso) + "</strong>",
        "У відпустці: " + this.esc(details.vacationsCount || 0),
      ];
      (details.vacations || []).forEach(
        function (item, index) {
          lines.push(
            String(index + 1) +
              ". " +
              this.esc(item.fml || item.shortLabel || "") +
              " — " +
              this.fmtDate(item.startIso) +
              "–" +
              this.fmtDate(item.endIso),
          );
        }.bind(this),
      );
      if (!details.vacationsCount) {
        lines.push("У відпустці нікого.");
      }
      if (details.problems && details.problems.length) {
        lines.push("<strong>Проблема:</strong>");
        details.problems.forEach(
          function (problem) {
            lines.push(this.esc(problem.message || problem.rule || "—"));
            if (problem.explanation) {
              lines.push(this.esc(problem.explanation));
            }
          }.bind(this),
        );
      }
      var suggestions = Array.isArray(details.fixSuggestions)
        ? details.fixSuggestions
        : [];
      if (suggestions.length) {
        lines.push("<strong>Варіанти вирішення:</strong>");
        suggestions.slice(0, 5).forEach(function (item, index) {
          lines.push(
            String(index + 1) +
              ". " +
              VacationModule.esc(item.title || item.personName || "Перенос") +
              " — " +
              VacationModule.esc(item.newStart || "") +
              "–" +
              VacationModule.esc(item.newEnd || ""),
          );
        });
      }
      return lines.join("<br>");
    },

    async showCalendarDayDetails(dateIso) {
      var calendar = this.state.monthCalendar;
      if (!calendar || !calendar.success || !dateIso) return;
      this.state.calendarDayDetails =
        '<div class="vacations-muted">Завантаження деталей…</div>';
      this.render();
      try {
        showLoading();
        var details = await runServerMethod_(
          "getVacationCalendarDayDetailsFromSidebar",
          [{ dateIso: dateIso }],
          "VacationModule.showCalendarDayDetails",
        );
        this.state.calendarDayDetails = this.formatCalendarDayDetailsHtml_(
          details,
        );
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async checkDate() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "validateVacationDateFromSidebar",
          [
            {
              fml: this.read("vacCheckPerson"),
              vacationNumber: Number(this.read("vacCheckNumber")),
              startDate: this.read("vacCheckStart"),
              days: Number(this.read("vacCheckDays")),
            },
          ],
          "VacationModule.checkDate",
        );
        this.state.checks = result.violations || [];
        this.state.problemsLoaded = true;
        this.setStatus(
          result.isValid ? "Дата допустима." : "Дата має порушення.",
          result.isValid ? "success" : "error",
        );
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async generateReport() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "generateVacationReportFromSidebar",
          [],
          "VacationModule.generateReport",
        );
        this.state.reportText = result.summary || "Звіт порожній.";
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        }
        this.setStatus("Звіт сформовано.", "success");
        this.render();
        var adminNote = result.adminSheet
          ? " (технічний аудит: " + result.adminSheet + ")"
          : "";
        logToConsole("✓ Звіт по відпустках сформовано" + adminNote, "success");
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    cancelVacation(index) {
      var vacation = this.state.vacations[index];
      if (!vacation) return;
      if (!window.confirm("Скасувати відпустку: " + vacation.fml + "?")) return;
      showLoading();
      runServerMethod_(
        "cancelVacationFromSidebar",
        [vacation],
        "VacationModule.cancelVacation",
      )
        .then(function () {
          showToast("✓ Відпустку скасовано");
          return VacationModule.loadState();
        })
        .catch(function (error) {
          VacationModule.showError(error);
        })
        .finally(function () {
          hideLoading();
        });
    },

    showError(error) {
      var message = normalizeError(error);
      this.setStatus(message, "error");
      this.render();
      logToConsole("✕ Відпустки: " + message, "error");
      showToast("✕ " + message);
    },
  };

  function showVacationsModule() {
    VacationModule.show();
  }

  function checkVacationRemindersFromMainPanel() {
    return VacationModule.checkReminders();
  }

  window.VacationModule = VacationModule;
  window.showVacationsModule = showVacationsModule;
</script>

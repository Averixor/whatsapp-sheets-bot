<script>
  // Js.Vacations — vacation module inside main WASB sidebar (resultContent).

  function renderVacationReminderResult_(vacations, message) {
    var html =
      '<div class="result-item">' +
      '<div class="result-label">Нагадування</div>' +
      '<div class="result-value">' +
      escapeHtml(message || "Перевірку виконано") +
      "</div>";
    if (
      typeof hasVacationBlocks === "function" &&
      hasVacationBlocks(vacations)
    ) {
      html += renderVacationAlerts(vacations);
    }
    html += "</div>";
    return html;
  }

  function formatDateUa(value) {
    if (typeof formatDateForDisplay === "function") {
      return formatDateForDisplay(value);
    }
    if (!value) return "";
    if (typeof value === "string") {
      var text = value.trim();
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) {
        return text;
      }
      if (/\d{4}-\d{2}-\d{2}/.test(text)) {
        return text.replace(
          /\b(\d{4})-(\d{2})-(\d{2})\b/g,
          function (_, year, month, day) {
            return day + "." + month + "." + year;
          },
        );
      }
    }
    var date = value instanceof Date ? value : new Date(value);
    if (!Number.isNaN(date.getTime())) {
      var dayPart = String(date.getDate()).padStart(2, "0");
      var monthPart = String(date.getMonth() + 1).padStart(2, "0");
      return dayPart + "." + monthPart + "." + date.getFullYear();
    }
    return String(value);
  }

  const VACATION_RULE_HUMAN_LABELS = {
    GAP_TOO_SHORT: "Замалий інтервал між відпустками",
    PERSON_GAP: "Замалий інтервал між відпустками",
    PERSON_OVERLAP: "Відпустки однієї людини перетинаються",
    START_TOO_CLOSE: "Дати початку занадто близько",
    START_GAP: "Дати початку занадто близько",
    YEAR_LIMIT: "Забагато відпусток у році",
    MAX_PERSON_YEAR: "Забагато відпусток у році",
    MAX_CONCURRENT: "Забагато людей одночасно у відпустці",
    INVALID_DATE: "Некоректна дата",
    INVALID_DURATION: "Некоректна тривалість",
    PERSONNEL_VACATION_WITHOUT_PLAN: "Статус PERSONNEL не підтверджений планом",
    MONTHLY_VACATION_WITHOUT_PLAN:
      "Код у місячному графіку не підтверджений планом",
    PLAN_WITHOUT_MONTHLY_VACATION: "План не відображений у місячному графіку",
    HIGH_LOAD_PERIOD: "Період на межі допустимого навантаження",
    MONTH_BALANCE: "Перекіс стартів відпусток у місяці",
    RIGHT_PANEL_LEGACY_DATA: "Дані у правій таблиці K:Q (не джерело істини)",
  };

  function normalizeVacationRuleType_(type) {
    var aliases = {
      GAP_TOO_SHORT: "PERSON_GAP",
      START_TOO_CLOSE: "START_GAP",
      YEAR_LIMIT: "MAX_PERSON_YEAR",
    };
    return aliases[type] || type;
  }

  function humanVacationRuleLabel_(type) {
    var key = String(type || "").trim();
    return (
      VACATION_RULE_HUMAN_LABELS[key] ||
      VACATION_RULE_HUMAN_LABELS[normalizeVacationRuleType_(key)] ||
      key ||
      "Проблема"
    );
  }

  function buildVacationProblemSuggestions_(problem) {
    var type = normalizeVacationRuleType_(
      String((problem && (problem.type || problem.rule)) || "").trim(),
    );
    if (type === "INVALID_DATE") {
      return [
        "Перевірити дату початку та дату завершення у джерелі плану відпусток.",
        "Перезаписати відпустку через модуль 🏖️ Відпустки, щоб формули перерахували дату.",
      ];
    }
    if (type === "INVALID_DURATION") {
      return [
        "Зменшити або виправити кількість днів відпустки.",
        "Перевірити travel-дні: вони не повинні ламати основну тривалість.",
      ];
    }
    if (type === "MAX_PERSON_YEAR") {
      return [
        "Скасувати або перенести одну з відпусток цієї людини на інший рік.",
        "Перевірити, чи не дублюється запис у джерелі плану відпусток.",
      ];
    }
    if (type === "PERSON_OVERLAP") {
      return [
        "Перенести одну з відпусток цієї людини.",
        "Якщо це дублікат — скасувати зайвий запис.",
      ];
    }
    if (type === "PERSON_GAP") {
      return [
        "Збільшити інтервал між відпустками цієї людини.",
        "Скористатися підбором дат для найближчого допустимого варіанту.",
      ];
    }
    if (type === "START_GAP") {
      return [
        "Рознести дати старту між цими людьми.",
        "Перенести одну відпустку на декілька днів раніше або пізніше.",
      ];
    }
    if (type === "MAX_CONCURRENT") {
      return [
        "Перенести одну з відпусток з цього періоду.",
        "Вибрати людину з найменш критичним графіком і підібрати нову дату.",
        "Скористатися вкладкою «Підібрати» для проблемного військовослужбовця.",
      ];
    }
    if (type === "HIGH_LOAD_PERIOD" || type === "MONTH_BALANCE") {
      return [
        "Перевірити навантаження підрозділу у вибраному періоді.",
        "За потреби підібрати менш завантажену дату.",
      ];
    }
    if (type === "PERSONNEL_VACATION_WITHOUT_PLAN") {
      return [
        "Перевірити поточний статус людини у PERSONNEL.",
        "Якщо людина у відпустці — додати або виправити відповідний запис у плані відпусток.",
      ];
    }
    if (type === "MONTHLY_VACATION_WITHOUT_PLAN") {
      return [
        "Перевірити код «Відпус» у місячному графіку.",
        "Якщо відпустка фактична — додати або виправити відповідний запис у плані відпусток.",
      ];
    }
    if (type === "PLAN_WITHOUT_MONTHLY_VACATION") {
      return [
        "Перевірити дати активної відпустки у плані відпусток.",
        "Якщо план уже застосований — встановити код «Відпус» у місячному графіку.",
      ];
    }
    if (type === "RIGHT_PANEL_LEGACY_DATA") {
      return [
        "Знайдено записи у K:Q. Натисніть, щоб перенести їх в основне джерело A:I.",
      ];
    }
    return [
      "Перевірити запис у джерелі плану відпусток.",
      "Спробувати перенести відпустку через модуль 🏖️ Відпустки.",
    ];
  }

  function renderVacationFixSuggestions_(problem) {
    var suggestions = Array.isArray(problem && problem.fixSuggestions)
      ? problem.fixSuggestions
      : [];
    if (!suggestions.length) {
      return buildVacationProblemSuggestions_(problem)
        .map(function (text) {
          return "<li>" + escapeHtml(text) + "</li>";
        })
        .join("");
    }
    return suggestions
      .map(function (item, suggestionIndex) {
        var effectHtml = (item.effect || [])
          .map(function (effect) {
            return "<li>" + escapeHtml(effect) + "</li>";
          })
          .join("");
        var risksHtml = (item.risks || [])
          .map(function (risk) {
            return "<li>" + escapeHtml(risk) + "</li>";
          })
          .join("");
        var applyAction = item.canAutoApply
          ? '<div class="result-screen-actions">' +
            '<button class="btn btn-secondary vacations-btn-sm" type="button" onclick="VacationModule.applyFixSuggestion(' +
            Number((problem && problem.__index) != null ? problem.__index : 0) +
            ", " +
            Number(suggestionIndex) +
            ')">Застосувати</button>' +
            "</div>"
          : item.autoApplyReason
            ? '<div class="vacations-muted">' +
              escapeHtml(item.autoApplyReason) +
              "</div>"
            : "";
        return (
          '<li class="vacation-fix-suggestion">' +
          "<strong>" +
          escapeHtml(item.title || item.personName || "Пропозиція") +
          "</strong>" +
          '<div class="vacations-muted">Було: ' +
          escapeHtml((item.oldStart || "—") + " – " + (item.oldEnd || "—")) +
          "</div>" +
          '<div class="vacations-muted">Стало: ' +
          escapeHtml((item.newStart || "—") + " – " + (item.newEnd || "—")) +
          "</div>" +
          (effectHtml
            ? '<div class="vacation-problem-card__subtitle">Ефект:</div><ul>' +
              effectHtml +
              "</ul>"
            : "") +
          (risksHtml
            ? '<div class="vacation-problem-card__subtitle">Ризик:</div><ul>' +
              risksHtml +
              "</ul>"
            : "") +
          applyAction +
          "</li>"
        );
      })
      .join("");
  }

  function renderVacationProblems_(checks) {
    var list = Array.isArray(checks) ? checks : [];
    if (!list.length) {
      return '<div class="vacations-card vacations-empty">Проблемних питань не знайдено.</div>';
    }
    return list
      .map(function (item, index) {
        var type = normalizeVacationRuleType_(
          String((item && (item.type || item.rule)) || "").trim(),
        );
        var label = humanVacationRuleLabel_(type);
        var problem = Object.assign({}, item, { __index: index });
        var suggestions = renderVacationFixSuggestions_(problem);
        var canFindNewDate =
          ["PERSON_GAP", "START_GAP", "MAX_CONCURRENT"].indexOf(type) !== -1 &&
          !(Array.isArray(item.fixSuggestions) && item.fixSuggestions.length);
        var findAction = canFindNewDate
          ? '<div class="result-screen-actions">' +
            '<button class="btn btn-secondary vacations-btn-sm" type="button" onclick="VacationModule.openFindFromProblem(' +
            Number(index) +
            ')">Підібрати нову дату</button>' +
            "</div>"
          : "";
        var migrationAction =
          type === "RIGHT_PANEL_LEGACY_DATA"
            ? '<div class="vacations-muted">Знайдено записи у K:Q. Натисніть, щоб перенести їх в основне джерело A:I.</div>' +
              '<div class="result-screen-actions">' +
              '<button class="btn btn-primary vacations-btn-sm" type="button" onclick="VacationModule.applyRightPanelMigration()">Міграція K:Q → A:I</button>' +
              "</div>"
            : "";
        var monthLabel =
          type === "MONTH_BALANCE" &&
          String(item.date || "").match(/^\d{4}-\d{1,2}$/)
            ? '<div class="vacations-muted">Місяць: ' +
              escapeHtml(formatMonthLabelUa_(item.date)) +
              "</div>"
            : "";
        return (
          '<div class="vacations-card vacation-problem-card">' +
          '<div class="vacations-card__head vacation-card-header">' +
          '<strong class="vacations-card__title vacation-card-title">' +
          escapeHtml(label) +
          '</strong><span class="vacations-badge vacation-card-badge">' +
          escapeHtml((item && item.severity) || "ERROR") +
          "</span></div>" +
          '<div class="vacation-problem-card__person">' +
          escapeHtml((item && item.fml) || "—") +
          "</div>" +
          monthLabel +
          '<div class="vacations-muted">Дата: ' +
          escapeHtml(formatDateUa((item && item.date) || "—")) +
          "</div>" +
          '<div class="vacation-problem-card__description">' +
          escapeHtml((item && (item.description || item.details)) || "") +
          "</div>" +
          '<div class="vacation-problem-card__subtitle">Варіанти вирішення:</div>' +
          "<ul>" +
          suggestions +
          "</ul>" +
          migrationAction +
          findAction +
          "</div>"
        );
      })
      .join("");
  }

  function formatMonthLabelUa_(yearMonth) {
    var months = [
      "січень",
      "лютий",
      "березень",
      "квітень",
      "травень",
      "червень",
      "липень",
      "серпень",
      "вересень",
      "жовтень",
      "листопад",
      "грудень",
    ];
    var match = String(yearMonth || "").match(/^(\d{4})-(\d{1,2})$/);
    if (!match) return String(yearMonth || "");
    return months[Number(match[2]) - 1] + " " + match[1];
  }

  const VacationModule = {
    state: {
      personnel: [],
      vacations: [],
      stats: { total: 0, activePeople: 0 },
      scheduleYear: new Date().getFullYear(),
      scheduleYearOptions: [],
      activeTab: "overview",
      statusMessage: "",
      statusType: "info",
      options: [],
      checks: [],
      problemsLoaded: false,
      problemSummary: null,
      rightPanelMigration: null,
      reportText: "",
      remindersHtml: "",
      moveIndex: "",
      findDraft: {},
    },

    esc(value) {
      return escapeHtml(String(value == null ? "" : value));
    },

    fmtDate(value) {
      return formatDateUa(value);
    },

    requestStatusLabel(status) {
      var labels = {
        Draft: "Чернетка",
        Proposed: "Запропоновано",
        Approved: "Затверджено",
        Applied: "Застосовано",
        Cancelled: "Скасовано",
      };
      return labels[String(status || "").trim()] || String(status || "").trim();
    },

    personLabel(person) {
      return person.callsign
        ? person.callsign + " — " + person.fml
        : person.fml;
    },

    vacationLabel(vacation) {
      return (
        (vacation.type || "Відпустка") +
        " | " +
        vacation.fml +
        " | " +
        this.fmtDate(vacation.startDate) +
        " — " +
        this.fmtDate(vacation.endDate)
      );
    },

    peopleOptions(selected) {
      return (
        '<option value="">Оберіть людину</option>' +
        this.state.personnel
          .map(function (person) {
            var sel = selected === person.fml ? " selected" : "";
            return (
              '<option value="' +
              VacationModule.esc(person.fml) +
              '"' +
              sel +
              ">" +
              VacationModule.esc(VacationModule.personLabel(person)) +
              "</option>"
            );
          })
          .join("")
      );
    },

    moveOptions(selectedIndex) {
      var html = '<option value="">Оберіть відпустку</option>';
      this.state.vacations.forEach(function (vacation, index) {
        var sel = String(selectedIndex) === String(index) ? " selected" : "";
        html +=
          '<option value="' +
          index +
          '"' +
          sel +
          ">" +
          VacationModule.esc(VacationModule.vacationLabel(vacation)) +
          "</option>";
      });
      return html;
    },

    statusHtml() {
      if (!this.state.statusMessage) return "";
      return (
        '<div class="vacations-status vacations-status--' +
        this.esc(this.state.statusType || "info") +
        '">' +
        this.esc(this.state.statusMessage) +
        "</div>"
      );
    },

    tabsHtml() {
      var tabs = [
        { id: "overview", label: "Огляд" },
        { id: "plan", label: "План" },
        { id: "add", label: "Додати" },
        { id: "find", label: "Підібрати" },
        { id: "check", label: "Проблеми" },
        { id: "report", label: "Звіт" },
      ];
      return (
        '<div class="vacations-tabs" role="tablist">' +
        tabs
          .map(function (tab) {
            var active =
              VacationModule.state.activeTab === tab.id ? " active" : "";
            return (
              '<button type="button" class="vacations-tab' +
              active +
              '" onclick="VacationModule.openTab(\'' +
              tab.id +
              "')\">" +
              VacationModule.esc(tab.label) +
              "</button>"
            );
          })
          .join("") +
        "</div>"
      );
    },

    vacationListHtml() {
      var vacations = this.state.vacations;
      if (!vacations.length) {
        return '<div class="vacations-empty">Активних відпусток немає.</div>';
      }
      return vacations
        .map(function (vacation, index) {
          var actions =
            '<button type="button" class="btn vacations-btn-sm" onclick="VacationModule.prepareMove(' +
            index +
            ')">Перенести</button>';
          if (vacation.manageable !== false) {
            actions +=
              '<button type="button" class="btn vacations-btn-sm vacations-btn-danger" onclick="VacationModule.cancelVacation(' +
              index +
              ')">Скасувати</button>';
          } else {
            actions +=
              '<span class="vacations-muted">Розрахункова дата з формульного блоку</span>';
          }
          return (
            '<div class="vacations-card">' +
            '<div class="vacations-card__head vacation-card-header">' +
            '<strong class="vacations-card__title vacation-card-title">' +
            VacationModule.esc(vacation.fml) +
            '</strong><span class="vacations-badge vacation-card-badge">' +
            VacationModule.esc(vacation.type) +
            "</span></div>" +
            '<div class="vacations-muted">' +
            VacationModule.esc(VacationModule.fmtDate(vacation.startDate)) +
            " — " +
            VacationModule.esc(VacationModule.fmtDate(vacation.endDate)) +
            " (" +
            VacationModule.esc(vacation.days) +
            " дн.)</div>" +
            (vacation.status
              ? '<div class="vacations-muted">Статус: ' +
                VacationModule.esc(
                  VacationModule.requestStatusLabel(vacation.status),
                ) +
                "</div>"
              : "") +
            '<div class="vacations-card__actions">' +
            actions +
            "</div></div>"
          );
        })
        .join("");
    },

    moveFormHtml() {
      if (this.state.moveIndex === "" || this.state.moveIndex == null) {
        return "";
      }
      return (
        '<div class="vacations-form vacations-form--spaced">' +
        '<div class="vacations-subtitle">Перенести відпустку</div>' +
        "<label>Відпустка</label>" +
        '<select id="vacMoveVacation">' +
        this.moveOptions(this.state.moveIndex) +
        "</select>" +
        "<label>Нова дата початку</label>" +
        '<input id="vacMoveStart" type="date">' +
        "<label>Кількість днів</label>" +
        '<input id="vacMoveDays" type="number" min="1" max="60" value="15">' +
        '<button type="button" class="btn btn-primary" onclick="VacationModule.submitMove()">Перенести</button>' +
        "</div>"
      );
    },

    optionsHtml() {
      var options = this.state.options;
      if (!options.length) {
        return '<div class="vacations-empty">Варіантів немає.</div>';
      }
      if (options[0].status === "REJECTED") {
        return (
          '<div class="vacations-empty">' +
          this.esc(
            options[0].explanation || "Допустимих варіантів не знайдено.",
          ) +
          "</div>"
        );
      }
      return options
        .map(function (item, index) {
          var cls = item.rank === 1 ? " best" : " valid";
          return (
            '<div class="vacations-card vacations-option' +
            cls +
            '">' +
            '<div class="vacations-card__head vacation-card-header">' +
            '<strong class="vacations-card__title vacation-card-title">Варіант ' +
            VacationModule.esc(item.rank) +
            '</strong><span class="vacations-badge vacation-card-badge">' +
            VacationModule.esc(item.label) +
            "</span></div>" +
            "<div>" +
            VacationModule.esc(VacationModule.fmtDate(item.startDate)) +
            " — " +
            VacationModule.esc(VacationModule.fmtDate(item.endDate)) +
            " | " +
            VacationModule.esc(item.days) +
            " дн. | score " +
            VacationModule.esc(item.score) +
            "</div>" +
            '<div class="vacations-muted">' +
            VacationModule.esc(item.explanation) +
            '</div><button type="button" class="btn btn-primary vacations-btn-sm" onclick="VacationModule.applyOption(' +
            index +
            ')">Застосувати</button></div>'
          );
        })
        .join("");
    },

    checksHtml() {
      if (!this.state.problemsLoaded) {
        return '<div class="vacations-card vacations-empty">Натисніть кнопку, щоб перевірити графік.</div>';
      }
      return renderVacationProblems_(this.state.checks);
    },

    rightPanelMigrationActionHtml() {
      return (
        '<div class="vacations-muted">Знайдено записи у K:Q. Натисніть, щоб перенести їх в основне джерело A:I.</div>' +
        '<div class="result-screen-actions">' +
        '<button class="btn btn-primary vacations-btn-sm" type="button" onclick="VacationModule.applyRightPanelMigration()">Міграція K:Q → A:I</button>' +
        "</div>"
      );
    },

    scheduleYearSelectorHtml() {
      var options = Array.isArray(this.state.scheduleYearOptions)
        ? this.state.scheduleYearOptions
        : [];
      if (!options.length) {
        options = [
          this.state.scheduleYear || new Date().getFullYear(),
          (this.state.scheduleYear || new Date().getFullYear()) + 1,
        ];
      }
      var selected = Number(this.state.scheduleYear) || options[0];
      return (
        '<div class="vacations-form vacations-form--inline">' +
        "<label>Рік графіка</label>" +
        '<select id="vacScheduleYear">' +
        options
          .map(function (year) {
            var sel = Number(year) === selected ? " selected" : "";
            return (
              '<option value="' +
              VacationModule.esc(year) +
              '"' +
              sel +
              ">" +
              VacationModule.esc(year) +
              "</option>"
            );
          })
          .join("") +
        "</select></div>"
      );
    },

    getScheduleYear_() {
      var raw = this.read("vacScheduleYear");
      var year = Number(raw);
      if (year >= 1900 && year <= 9999) return year;
      return Number(this.state.scheduleYear) || new Date().getFullYear();
    },

    scheduleSummaryHtml() {
      var summary = this.state.problemSummary || {};
      var total = Number(this.state.stats.total || summary.scheduleRows || 0);
      var problemCount = Number(
        summary.problemCount || summary.errorCount || 0,
      );
      var panel = this.state.rightPanelMigration || {};
      var year = this.getScheduleYear_();
      var html =
        '<div class="vacations-card vacations-schedule-summary">' +
        '<div class="vacations-card__head"><strong>🏖️ Графік відпусток на ' +
        this.esc(year) +
        " рік</strong></div>" +
        this.scheduleYearSelectorHtml() +

    render() {
      setHtml(
        "resultContent",
        '<div class="vacations-module vacation-module" id="vacationsModuleRoot">' +
          this.tabsHtml() +
          '<div class="vacations-panel">' +
          this.panelHtml() +
          this.statusHtml() +

    setStatus(message, type) {
      this.state.statusMessage = message || "";
      this.state.statusType = type || "info";
    },

    read(id) {
      var el = document.getElementById(id);
      return el ? el.value : "";
    },

    todayInputDate() {
      var now = new Date();
      return (
        now.getFullYear() +
        "-" +
        String(now.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(now.getDate()).padStart(2, "0")
      );
    },

    problemFindDraft(problem) {
      var item = problem || {};
      var fml = String(item.primaryFml || item.fml || "").trim();
      if (/[\/,]/.test(fml) && !item.primaryFml) fml = "";
      var date = String(item.startDate || item.date || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = this.todayInputDate();
      var vacationNumber = Number(item.vacationNumber) || 0;
      var days = Number(item.days) || 0;
      return {
        fml: fml,
        vacationNumber: vacationNumber || 1,
        startDate: date,
        days: days || 15,
        searchWindow: 30,
        complete: !!(fml && vacationNumber && days),
      };
    },

    show() {
      showStandardResult("🏖️ Відпустки");
      setText("resultTitle", "🏖️ Відпустки");
      this.state.activeTab = "overview";
      this.setStatus("Завантаження…", "info");
      this.render();
      this.loadState();
    },

    async loadState() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "getVacationSidebarState",
          [],
          "VacationModule.loadState",
        );
        this.state.personnel = result.personnel || [];
        this.state.vacations = result.vacations || [];
        this.state.stats = result.stats || { total: 0, activePeople: 0 };
        this.state.scheduleYear =
          Number(result.scheduleYear) || new Date().getFullYear();
        this.state.scheduleYearOptions = Array.isArray(
          result.scheduleYearOptions,
        )
          ? result.scheduleYearOptions
          : [];
        this.state.problemSummary = result.problemSummary || null;
        this.state.rightPanelMigration = result.rightPanelMigration || null;
        this.setStatus("", "info");
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    openTab(tab) {
      this.state.activeTab = tab;
      this.setStatus("", "info");
      this.render();
    },

    openFindFromProblem(index) {
      var problem = this.state.checks[Number(index)];
      if (!problem) return;
      var draft = this.problemFindDraft(problem);
      this.state.findDraft = draft;
      this.state.options = [];
      this.state.activeTab = "find";
      this.setStatus(
        draft.complete
          ? "Поля підбору заповнено з проблемного питання."
          : "Не вдалося однозначно визначити відпустку. Перевірте поля підбору вручну.",
        draft.complete ? "info" : "warning",
      );
      this.render();
    },

    async applyRightPanelMigration() {
      showLoading();
      try {
        var result = await runServerMethod_(
          "applyRightPanelMigrationFromSidebar",
          [],
          "VacationModule.applyRightPanelMigration",
        );
        var migration = (result && result.migration) || result || {};
        var message =
          migration.message ||
          (migration.migrated > 0
            ? "Перенесено записів: " + migration.migrated
            : "Міграцію правої таблиці завершено");
        showToast("✓ " + message);
        this.setStatus(message, migration.migrated > 0 ? "success" : "info");
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        }
        if (result.rightPanelMigration) {
          this.state.rightPanelMigration = result.rightPanelMigration;
        }
        if (result.vacations) {
          this.state.vacations = result.vacations;
        }
        if (result.stats) {
          this.state.stats = result.stats;
        }
        await this.loadState();
        if (this.state.problemsLoaded) {
          await this.loadProblems();
        } else {
          this.render();
        }
        logToConsole("✓ " + message, "success");
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async applyFixSuggestion(problemIndex, suggestionIndex) {
      var problem = this.state.checks[Number(problemIndex)];
      var suggestion =
        problem &&
        Array.isArray(problem.fixSuggestions) &&
        problem.fixSuggestions[Number(suggestionIndex)];
      if (!suggestion) {
        this.setStatus("Пропозицію не знайдено", "error");
        return;
      }
      if (!suggestion.canAutoApply) {
        this.setStatus(
          suggestion.autoApplyReason ||
            "Цю пропозицію не можна застосувати автоматично",
          "warning",
        );
        return;
      }
      showLoading();
      try {
        await runServerMethod_(
          "applyVacationSuggestionFromSidebar",
          [
            Object.assign({}, suggestion, {
              fml: suggestion.personName || suggestion.fml,
              issueId: problem.issueId || "",
            }),
          ],
          "VacationModule.applyFixSuggestion",
        );
        showToast("✓ Пропозицію застосовано");
        await this.loadProblems();
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

    async checkReminders() {
      showLoading();
      try {
        var result = await ActionDispatcher.run(
          "checkVacationsAndBirthdays",
          function () {
            return Stage7Api.checkVacationsAndBirthdays({
              date: _todayStr_(),
              recipientRole: getSelectedCommanderRecipient_(),
            });
          },
        );
        if (!result || !result.success) {
          throw new Error(result?.error || "Не вдалося перевірити нагадування");
        }
        this.state.remindersHtml = renderVacationReminderResult_(
          result.vacations || {},
          result.message || "",
        );
        this.setStatus("🏖️ Нагадування про відпустки перевірено", "success");
        logToConsole("🏖️ Нагадування про відпустки перевірено", "success");
        this.render();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }
    },

      showLoading();
      try {
        var year = this.getScheduleYear_();
        this.state.scheduleYear = year;
        var result = await runServerMethod_(
          "rebuildVacationScheduleFromSidebar",
          [{ year: year }],

          "✓ Графік відпусток оновлено (" +
            year +
            "): " +
            (result.schedulePeople || 0) +
            " людей, " +
            (result.scheduleDays || 0) +
            " днів",
          "success",
        );
        if (result.scheduleYear) {
          this.state.scheduleYear = Number(result.scheduleYear);
        }
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        }
        await this.loadState();
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();

        var result = await runServerMethod_(

          [

              requestId: vacation.requestId,
              personKey: vacation.personKey,
              fml: vacation.fml,

              type: vacation.type,
              sourceRow: vacation.sourceRow,
              sourceStartColumn: vacation.sourceStartColumn,
              startDate: this.read("vacMoveStart"),
              days: Number(this.read("vacMoveDays")),
            },
          ],
          "VacationModule.submitMove",

    async loadProblems() {

      try {
        var result = await runServerMethod_(
          "checkVacationRulesFromSidebar",
          [],
          "VacationModule.loadProblems",
        );
        this.state.checks = result.checks || [];
        this.state.problemsLoaded = true;
        if (result.problemSummary) {
          this.state.problemSummary = result.problemSummary;
        } else if (result.errorCount != null) {
          this.state.problemSummary = {
            errorCount: result.errorCount,
            warningCount: result.warningCount || 0,
            problemCount: result.problemCount || result.errorCount,
            scheduleRows: result.scheduleRows || this.state.stats.total,
            items: [],
            summaryLine: "",
          };
        }
        this.setStatus(
          result.problemCount || result.errorCount
            ? "Проблемних питань: " + (result.problemCount || result.errorCount)
            : "Проблемних питань не знайдено.",
          result.problemCount || result.errorCount ? "warning" : "success",
        );
        this.render();
        logToConsole(
          this.state.checks.length
            ? "⚠ Проблемних питань: " + this.state.checks.length
            : "✓ Проблемних питань не знайдено",
          this.state.checks.length ? "warning" : "success",
        );
      } catch (error) {
        this.showError(error);
      } finally {
        hideLoading();
      }

    cancelVacation(index) {
      var vacation = this.state.vacations[index];
      if (!vacation) return;
      if (!window.confirm("Скасувати відпустку: " + vacation.fml + "?")) return;
      showLoading();
      runServerMethod_(
        "cancelVacationFromSidebar",
        [vacation],
        "VacationModule.cancelVacation",
      )
        .then(function () {
          showToast("✓ Відпустку скасовано");
          return VacationModule.loadState();
        })
        .catch(function (error) {
          VacationModule.showError(error);
        })
        .finally(function () {
          hideLoading();
        });
    },

    showError(error) {
      var message = normalizeError(error);
      this.setStatus(message, "error");
      this.render();
      logToConsole("✕ Відпустки: " + message, "error");
      showToast("✕ " + message);
    },
  };

  function showVacationsModule() {
    VacationModule.show();
  }

  function checkVacationRemindersFromMainPanel() {
    return VacationModule.checkReminders();
  }

  window.VacationModule = VacationModule;
  window.showVacationsModule = showVacationsModule;
</script>
